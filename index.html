<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản lý Đặt Phòng</title>
    <style>
        :root {
            --bg-gray: #f4f4f4;
            --empty: #2ecc71; /* Xanh lá */
            --occupied: #e74c3c; /* Đỏ */
            --cleaning: #f1c40f; /* Vàng */
            --waiting: #3498db; /* Xanh dương */
            --unpaid: #9b59b6; /* Tím */
            --blank: #bdc3c7; /* Xám */
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg-gray); overflow-x: hidden; }
        
        /* Header */
        header { background: #2d5a27; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .add-room-btn { background: #fff; color: #2d5a27; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Main Layout */
        .app-container { display: flex; margin-top: 10px; background: white; }
        
        /* Cột Phòng (Cố định bên trái) */
        .room-column { width: 120px; flex-shrink: 0; border-right: 2px solid #ddd; background: #fff; position: sticky; left: 0; z-index: 10; }
        .room-header { height: 50px; background: #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; border-bottom: 1px solid #ddd; }
        .room-item { height: 70px; padding: 10px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; justify-content: center; cursor: pointer; }
        .room-name { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        /* Lịch cuộn ngang (Bên phải) */
        .calendar-scroll { flex-grow: 1; overflow-x: auto; display: flex; flex-direction: column; }
        .days-row { display: flex; height: 50px; background: #eee; border-bottom: 1px solid #ddd; }
        .day-cell { min-width: 60px; text-align: center; border-right: 1px solid #ddd; display: flex; flex-direction: column; justify-content: center; font-size: 12px; }
        .booking-row { display: flex; height: 70px; border-bottom: 1px solid #eee; }
        .booking-cell { min-width: 60px; border-right: 1px solid #eee; background: var(--blank); position: relative; }

        /* Màu sắc ô lịch */
        .cell-occupied { background: var(--occupied) !important; color: white; }
        .cell-paid { background: var(--waiting) !important; color: white; }
        .cell-unpaid { background: var(--unpaid) !important; color: white; }

        /* Modal / Popup */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 10px; padding: 20px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; }
        
        /* Grid lịch trong Modal */
        .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .mini-cell { aspect-ratio: 1; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 4px; }

        .legend { margin-top: 15px; font-size: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<header>
    <span>QUẢN LÝ PHÒNG</span>
    <button class="add-room-btn" onclick="alert('Mở form thêm phòng mới...')">+ Thêm phòng</button>
</header>

<div class="app-container">
    <div class="room-column">
        <div class="room-header">Phòng</div>
        <div class="room-item" onclick="openModal('P102')">
            <div class="room-name">P102</div>
            <div class="status-dot" style="background: var(--occupied);"></div>
        </div>
        <div class="room-item" onclick="openModal('P201')">
            <div class="room-name">P201</div>
            <div class="status-dot" style="background: var(--empty);"></div>
        </div>
        <div class="room-item" onclick="openModal('P305')">
            <div class="room-name">P305</div>
            <div class="status-dot" style="background: var(--waiting);"></div>
        </div>
    </div>

    <div class="calendar-scroll">
        <div class="days-row" id="daysRow">
            </div>
        <div id="bookingRows">
            </div>
    </div>
</div>

<div class="modal" id="roomModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">Chi tiết lịch phòng</h3>
        <p>Tháng 04/2026</p>
        
        <div class="mini-grid" id="miniGrid">
            </div>

        <div class="legend">
            <div class="legend-item"><div class="status-dot" style="background: var(--occupied);"></div> Đang ở</div>
            <div class="legend-item"><div class="status-dot" style="background: var(--waiting);"></div> Đã cọc đủ</div>
            <div class="legend-item"><div class="status-dot" style="background: var(--unpaid);"></div> Cọc chưa đủ</div>
            <div class="legend-item"><div class="status-dot" style="background: var(--blank);"></div> Trống</div>
        </div>
    </div>
</div>

<script>
    // Tạo dữ liệu ngày demo
    const daysRow = document.getElementById('daysRow');
    for (let i = 1; i <= 30; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.innerHTML = `<span>T${(i%7)+2}</span><b>${i < 10 ? '0'+i : i}/04</b>`;
        daysRow.appendChild(cell);
    }

    // Tạo hàng booking demo
    const bookingRows = document.getElementById('bookingRows');
    const demoData = [
        { name: 'P102', pattern: [0, 1, 1, 1, 0, 0, 3, 3, 0] }, // 1: Đỏ (ở), 3: Tím (chưa cọc)
        { name: 'P201', pattern: [0, 0, 0, 2, 2, 0, 0, 0, 0] }, // 2: Xanh dương (cọc đủ)
        { name: 'P305', pattern: [0, 0, 1, 1, 0, 0, 0, 0, 0] }
    ];

    demoData.forEach(room => {
        const row = document.createElement('div');
        row.className = 'booking-row';
        for (let i = 0; i < 30; i++) {
            const cell = document.createElement('div');
            cell.className = 'booking-cell';
            const val = room.pattern[i] || 0;
            if (val === 1) cell.classList.add('cell-occupied');
            if (val === 2) cell.classList.add('cell-paid');
            if (val === 3) cell.classList.add('cell-unpaid');
            row.appendChild(cell);
        }
        bookingRows.appendChild(row);
    });

    // Modal Logic
    function openModal(roomName) {
        document.getElementById('modalTitle').innerText = "Chi tiết lịch phòng " + roomName;
        const grid = document.getElementById('miniGrid');
        grid.innerHTML = '';
        
        // Tạo 30 ô ngày trong modal
        for (let i = 1; i <= 30; i++) {
            const cell = document.createElement('div');
            cell.className = 'mini-cell';
            cell.innerText = i;
            
            // Demo tô màu ngẫu nhiên trong modal
            if (i >= 1 && i <= 3) cell.style.background = 'var(--occupied)';
            else if (i >= 10 && i <= 11) cell.style.background = 'var(--waiting)';
            else if (i >= 15 && i <= 17) cell.style.background = 'var(--unpaid)';
            else cell.style.background = 'var(--blank)';
            
            if (cell.style.background !== 'var(--blank)') cell.style.color = 'white';
            
            grid.appendChild(cell);
        }
        
        document.getElementById('roomModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('roomModal').style.display = 'none';
    }
</script>

</body>
</html>
