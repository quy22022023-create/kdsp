<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ST-STOCK PRO v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #007aff; --danger: #ff3b30; --success: #34c759; --border: #e5e5ea; --bg: #f2f2f7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1c1c1e; }

        /* Header & Dash */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 5px; }
        .header h1 { font-size: 22px; margin: 0; font-weight: 800; color: #000; }
        
        .smart-dash { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-card { flex: 1; background: #fff; padding: 12px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border); }
        .stat-val { font-size: 20px; font-weight: 800; display: block; }
        .stat-label { font-size: 10px; color: #8e8e93; font-weight: 700; text-transform: uppercase; }

        /* Filter System */
        .filter-panel { background: #fff; padding: 12px; border-radius: 14px; margin-bottom: 15px; border: 1px solid var(--border); }
        .search-box { position: relative; margin-bottom: 10px; }
        .search-box input { width: 100%; padding: 12px 12px 12px 40px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); font-size: 15px; }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #8e8e93; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        select { padding: 10px; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; background: #fff; appearance: none; }

        /* Excel Table */
        .table-wrapper { background: #fff; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f9f9fb; padding: 12px 10px; text-align: left; color: #8e8e93; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        td { padding: 14px 10px; border-bottom: 1px solid #f2f2f7; font-size: 14px; }
        
        tr.low-stock { background-color: #fff1f0; }
        .name-cell { font-weight: 700; display: block; }
        .sub-cell { font-size: 11px; color: #8e8e93; }
        .qty-cell { font-size: 18px; font-weight: 800; text-align: center; }

        /* Actions */
        .btn-group { display: flex; gap: 6px; justify-content: flex-end; }
        .btn-icon { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* Floating Button */
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 30px; border: none; font-size: 24px; box-shadow: 0 5px 20px rgba(0,122,255,0.4); z-index: 9; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal-box { background: #fff; width: 92%; max-width: 400px; border-radius: 20px; padding: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 11px; font-weight: 700; color: #8e8e93; margin-bottom: 5px; text-transform: uppercase; }
        .field input, .field select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 16px; outline: none; }
        .btn-save { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; font-size: 16px; margin-top: 10px; }

        @media (max-width: 400px) { .hide-xs { display: none; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Kho Dao Pro</h1>
        <div style="font-size: 12px; color: var(--primary); font-weight: 700;">CLOUD SYNC</div>
    </div>

    <div class="smart-dash">
        <div class="stat-card">
            <span class="stat-label">Tổng loại</span>
            <span id="statTotal" class="stat-val">0</span>
        </div>
        <div class="stat-card" style="border-bottom: 3px solid var(--danger);">
            <span class="stat-label" style="color: var(--danger)">Cần nhập thêm</span>
            <span id="statLow" class="stat-val" style="color: var(--danger)">0</span>
        </div>
    </div>

    <div class="filter-panel">
        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInput" placeholder="Tìm tên dao hoặc hãng..." onkeyup="render()">
        </div>
        <div class="filter-grid">
            <select id="filterThick" onchange="render()"><option value="">Tất cả dày</option><option>0.7</option><option>1.05</option><option>1.42</option></select>
            <select id="filterOrigin" onchange="render()"><option value="">Tất cả xuất xứ</option><option>Nhật Bản</option><option>Đức</option><option>Trung Quốc</option></select>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th style="text-align: center;">Tồn</th>
                    <th style="text-align: right;">Hành động</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>

    <button class="fab" onclick="toggleModal('formModal')"><i class="fa fa-plus"></i></button>

    <div id="formModal" class="modal">
        <div class="modal-box">
            <h3 style="margin-top:0">Thêm mã dao mới</h3>
            <div class="field"><label>Tên dao</label><input type="text" id="in_name" placeholder="VD: Bohler Nhật"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="field"><label>Độ dày (mm)</label><select id="in_thick"><option>0.7</option><option>1.05</option><option>1.42</option></select></div>
                <div class="field"><label>Chiều cao (mm)</label><input type="number" id="in_height" step="0.01" value="23.8"></div>
            </div>
            <div class="field"><label>Xuất xứ</label><select id="in_origin"><option>Nhật Bản</option><option>Đức</option><option>Trung Quốc</option></select></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="field"><label>Số hộp tồn</label><input type="number" id="in_qty" value="0"></div>
                <div class="field"><label>Báo động dưới</label><input type="number" id="in_alert" value="2"></div>
            </div>
            <button class="btn-save" onclick="saveToCloud()">LƯU VÀO KHO</button>
            <button onclick="toggleModal('formModal')" style="width:100%; border:none; background:none; color:var(--danger); margin-top:10px; font-weight:600">HỦY BỎ</button>
        </div>
    </div>

    <div id="ioModal" class="modal">
        <div class="modal-box">
            <h3 id="ioTitle" style="margin-top:0">Cập nhật kho</h3>
            <div class="field"><label>Số lượng hộp</label><input type="number" id="ioQty" placeholder="0"></div>
            <button id="ioBtn" onclick="updateStock()" class="btn-save"></button>
            <button onclick="toggleModal('ioModal')" style="width:100%; border:none; background:none; color:var(--danger); margin-top:10px">ĐÓNG</button>
        </div>
    </div>

    <script>
        const URL = "https://awxkvzkigfxoidnvmxew.supabase.co";
        const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3eGt2emtpZ2Z4b2lkbnZteGV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzUwNTcsImV4cCI6MjA4NTg1MTA1N30.eBGQc3rp9-H4ipsCDhUdLTC7aJB6HHDh6CKwsvV9b3A";
        const sb = supabase.createClient(URL, KEY);
        let products = [], currentId = null, currentType = "";

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function render() {
            const { data } = await sb.from('products').select('*').order('name');
            products = data || [];
            const body = document.getElementById('inventoryBody');
            const kw = document.getElementById('searchInput').value.toLowerCase();
            const fThick = document.getElementById('filterThick').value;
            const fOrigin = document.getElementById('filterOrigin').value;

            body.innerHTML = "";
            let lowCount = 0;

            products.forEach(p => {
                const isLow = p.quantity <= (p.alertLimit || 2);
                if (isLow) lowCount++;

                const matchKw = !kw || p.name.toLowerCase().includes(kw);
                const matchThick = !fThick || p.size.toString() === fThick;
                const matchOrigin = !fOrigin || p.origin === fOrigin;

                if (matchKw && matchThick && matchOrigin) {
                    body.innerHTML += `
                        <tr class="${isLow ? 'low-stock' : ''}">
                            <td>
                                <span class="name-cell">${p.name}</span>
                                <span class="sub-cell">${p.size}mm | ${p.origin}</span>
                            </td>
                            <td class="qty-cell" style="color: ${isLow ? 'var(--danger)' : 'var(--success)'}">
                                ${p.quantity}
                            </td>
                            <td>
                                <div class="btn-group">
                                    <button class="btn-icon" style="color:var(--primary)" onclick="openIO('${p.id}', 'nhap')"><i class="fa fa-plus"></i></button>
                                    <button class="btn-icon" style="color:var(--danger)" onclick="openIO('${p.id}', 'xuat')"><i class="fa fa-minus"></i></button>
                                    <button class="btn-icon" onclick="deleteProduct('${p.id}')"><i class="fa fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            });
            document.getElementById('statTotal').innerText = products.length;
            document.getElementById('statLow').innerText = lowCount;
        }

        async function saveToCloud() {
            const name = document.getElementById('in_name').value;
            if(!name) return alert("Vui lòng nhập tên dao!");

            const newProduct = {
                name: name,
                size: document.getElementById('in_thick').value,
                height: document.getElementById('in_height').value,
                origin: document.getElementById('in_origin').value,
                quantity: parseInt(document.getElementById('in_qty').value) || 0,
                alertLimit: parseInt(document.getElementById('in_alert').value) || 2
            };

            const { error } = await sb.from('products').insert([newProduct]);
            if(error) {
                alert("Lỗi: " + error.message);
            } else {
                toggleModal('formModal');
                document.getElementById('in_name').value = ""; // Reset
                render();
            }
        }

        function openIO(id, type) {
            currentId = id; currentType = type;
            const btn = document.getElementById('ioBtn');
            document.getElementById('ioTitle').innerText = type === 'nhap' ? 'Nhập thêm hộp' : 'Xuất kho hộp';
            btn.innerText = type === 'nhap' ? 'XÁC NHẬN NHẬP' : 'XÁC NHẬN XUẤT';
            btn.style.background = type === 'nhap' ? 'var(--success)' : 'var(--danger)';
            toggleModal('ioModal');
        }

        async function updateStock() {
            const p = products.find(x => x.id === currentId);
            const val = parseInt(document.getElementById('ioQty').value);
            if(!val || val <= 0) return alert("Nhập số lượng hợp lệ!");

            const nextQty = currentType === 'nhap' ? p.quantity + val : p.quantity - val;
            if(nextQty < 0) return alert("Không đủ hàng trong kho!");

            await sb.from('products').update({ quantity: nextQty }).eq('id', currentId);
            document.getElementById('ioQty').value = "";
            toggleModal('ioModal');
            render();
        }

        async function deleteProduct(id) {
            if(confirm("Bạn có chắc chắn muốn xóa mã dao này?")) {
                await sb.from('products').delete().eq('id', id);
                render();
            }
        }

        // Khởi chạy lần đầu
        render();
    </script>
</body>
</html>
