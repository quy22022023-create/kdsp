<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kho Dao Bế Pro - v2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #007aff; --danger: #ff3b30; --success: #34c759; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 50px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin: 0 0 15px 0; font-size: 18px; color: var(--primary); text-align: center; }
        label { display: block; font-size: 12px; color: #8e8e93; margin-top: 10px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-top: 5px; }
        
        .attr-row { display: flex; gap: 5px; margin-top: 8px; }
        .attr-row input { font-size: 13px; padding: 8px; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-outline { background: none; color: var(--primary); border: 1px solid var(--primary); padding: 8px; font-size: 13px; }
        
        .item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; position: relative; border-left: 5px solid var(--primary); }
        .qty-box { position: absolute; top: 15px; right: 15px; text-align: right; }
        .qty-val { font-size: 18px; font-weight: 800; color: var(--danger); }
        .tag { background: #e5e5ea; padding: 3px 7px; border-radius: 5px; font-size: 11px; margin-right: 4px; display: inline-block; margin-top: 5px; }
        
        .actions { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-sm { flex: 1; padding: 8px; border-radius: 8px; font-size: 13px; border: none; font-weight: 600; cursor: pointer; }
        .btn-out { background: #fff1f0; color: var(--danger); }
        .btn-del { background: #f4f4f4; color: #8e8e93; max-width: 60px; }
    </style>
</head>
<body>

<div class="card">
    <h2>THÊM DAO MỚI</h2>
    <input type="text" id="ten" placeholder="Tên Dao / SKU">
    <select id="loai">
        <option value="Dao Cắt">Dao Cắt</option>
        <option value="Dao Cấn">Dao Cấn</option>
        <option value="Dao Răng">Dao Răng</option>
    </select>
    
    <div id="attrs">
        <div class="attr-row">
            <input type="text" placeholder="Đặc tính (VD: Dày chân)" class="at-n">
            <input type="text" placeholder="Giá trị (1.42)" class="at-v">
        </div>
    </div>
    <button class="btn-outline" style="border:none" onclick="addAttr()">+ Thêm đặc tính</button>
    
    <label>SỐ LƯỢNG NHẬP (MÉT)</label>
    <input type="number" id="sl" value="0" step="0.1">
    <button class="btn btn-save" id="btnSave" onclick="save()">LƯU VÀO KHO</button>
</div>

<h3>TỒN KHO THỰC TẾ</h3>
<div id="list">Đang tải...</div>

<script>
    const URL = "https://awxkvzkigfxoidnvmxew.supabase.co";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3eGt2emtpZ2Z4b2lkbnZteGV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzUwNTcsImV4cCI6MjA4NTg1MTA1N30.eBGQc3rp9-H4ipsCDhUdLTC7aJB6HHDh6CKwsvV9b3A";
    const sb = supabase.createClient(URL, KEY);

    function addAttr() {
        const d = document.createElement('div'); d.className='attr-row';
        d.innerHTML = `<input type="text" placeholder="Tên" class="at-n"><input type="text" placeholder="Giá trị" class="at-v">`;
        document.getElementById('attrs').appendChild(d);
    }

    async function save() {
        const ten = document.getElementById('ten').value;
        if(!ten) return alert("Nhập tên dao");
        const dactinh = {};
        document.querySelectorAll('.attr-row').forEach(r => {
            const n = r.querySelector('.at-n').value; const v = r.querySelector('.at-v').value;
            if(n && v) dactinh[n] = v;
        });
        const { error } = await sb.from('kho_dao').insert([{ 
            ten_dao: ten, loai_dao: document.getElementById('loai').value, 
            dac_tinh: dactinh, so_luong: parseFloat(document.getElementById('sl').value) 
        }]);
        if(error) alert(error.message); else location.reload();
    }

    async function xuatKho(id, currentQty) {
        const v = prompt("Nhập số mét cần XUẤT:");
        if(!v || isNaN(v)) return;
        const newQty = currentQty - parseFloat(v);
        if(newQty < 0) return alert("Không đủ hàng để xuất!");
        const { error } = await sb.from('kho_dao').update({ so_luong: newQty }).eq('id', id);
        if(error) alert(error.message); else load();
    }

    async function xoaDao(id) {
        if(confirm("Xóa vĩnh viễn mã này?")) {
            await sb.from('kho_dao').delete().eq('id', id);
            load();
        }
    }

    async function load() {
        const { data } = await sb.from('kho_dao').select('*').order('ngay_tao', { ascending: false });
        const container = document.getElementById('list'); container.innerHTML = "";
        data?.forEach(i => {
            let ts = ""; for(let k in i.dac_tinh) ts += `<span class="tag">${k}: ${i.dac_tinh[k]}</span>`;
            container.innerHTML += `
                <div class="item">
                    <div class="qty-box"><div class="qty-val">${i.so_luong}</div><small>mét</small></div>
                    <strong>${i.ten_dao}</strong><br><small>${i.loai_dao}</small>
                    <div>${ts}</div>
                    <div class="actions">
                        <button class="btn-sm btn-out" onclick="xuatKho('${i.id}', ${i.so_luong})">XUẤT KHO</button>
                        <button class="btn-sm btn-del" onclick="xoaDao('${i.id}')">XÓA</button>
                    </div>
                </div>`;
        });
    }
    load();
</script>
</body>
</html>
