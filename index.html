<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PMS V6 - Safe Area Optimized</title>
    <style>
        :root {
            --primary: #003580; --secondary: #feba02; --bg: #f8f9fa;
            --red: #d4111e; --blue: #0071c2; --purple: #a332c3; --yellow: #f1c40f; --green: #008009;
            --text-main: #1a1a1a; --text-sub: #666; --border: #e0e0e0;
            --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); overflow: hidden; color: var(--text-main); }

        /* --- TỐI ƯU iOS SAFE AREA: CHỐNG CHE KHUẤT --- */
        header {
            background: var(--primary); color: white; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center; height: calc(60px + var(--safe-top));
            padding-top: var(--safe-top); /* Chừa chỗ cho Dynamic Island/Notch */
            z-index: 1001; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-left { display: flex; flex-direction: column; }
        .app-title { font-size: 16px; font-weight: 800; }
        .app-date { font-size: 11px; color: var(--secondary); font-weight: bold; }

        .btn-add-room { background: #34c759; color: white; border: none; padding: 7px 12px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }

        /* --- MAIN APP LAYOUT --- */
        .app-container { display: grid; grid-template-columns: 100px 1fr; height: calc(100vh - 60px - var(--safe-top)); width: 100vw; overflow: hidden; }

        /* SIDEBAR PHÒNG (FIXED LEFT) */
        .sidebar { background: white; border-right: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; z-index: 100; }
        .sb-head { height: 45px; background: #fff; border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; position: sticky; top: 0; z-index: 110; }
        .room-card {
            height: 80px; border-bottom: 1px solid #f0f0f0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 5px; cursor: pointer; position: relative; transition: 0.2s;
        }
        .room-card:active { background: #f0f4fa; }
        .room-id { font-weight: 800; font-size: 16px; margin-bottom: 2px; }
        .room-price { font-size: 11px; color: var(--primary); font-weight: bold; }
        
        /* Chấm trạng thái thông minh */
        .status-led {
            width: 10px; height: 10px; border-radius: 50%; border: 2px solid white;
            position: absolute; bottom: 8px; right: 8px; box-shadow: 0 0 3px rgba(0,0,0,0.2);
        }

        /* VÙNG LỊCH (SCROLLABLE RIGHT) */
        .timeline { overflow: auto; background: white; position: relative; }
        .timeline-head { display: flex; height: 45px; background: white; position: sticky; top: 0; z-index: 90; border-bottom: 2px solid var(--border); }
        .time-cell {
            min-width: 70px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 10px;
        }
        .time-cell b { font-size: 14px; margin-bottom: 1px; }
        .time-cell.today { background: #fff9db; border-bottom: 3px solid var(--secondary); color: #e67e22; font-weight: bold; }

        .booking-rows { display: flex; flex-direction: column; width: fit-content; }
        .row { display: flex; height: 80px; }
        .cell {
            min-width: 70px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0;
            display: flex; align-items: center; flex-shrink: 0; padding: 2px; position: relative;
        }

        /* BAR KHÁCH HÀNG LIỀN MẠCH */
        .booking-bar {
            width: 100%; height: 85%; border-radius: 4px; display: flex; 
            flex-direction: column; justify-content: center; padding: 5px;
            color: white; font-size: 10px; line-height: 1.2; font-weight: 500;
            cursor: pointer;
        }
        .bar-name { font-weight: bold; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Màu trạng thái nghiệp vụ */
        .bg-empty { background: var(--status-empty); }
        .bg-red { background: var(--red); }
        .bg-dirty { background: var(--status-dirty); color: black !important; justify-content: center; text-align: center; font-weight: bold;}
        .bg-blue { background: var(--blue); }
        .bg-purple { background: var(--purple); }

        /* MODAL GIAO DIỆN IPHONE NATIVE */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-inner {
            background: white; width: 100%; max-width: 380px; border-radius: 16px;
            overflow: hidden; animation: slideUp 0.3s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-head { background: var(--primary); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        .modal-body { padding: 20px; max-height: 80vh; overflow-y: auto; }
        
        .f-group { margin-bottom: 15px; }
        .f-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        .f-group input, .f-group select, .f-group textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none;
        }
        .f-group input:focus { border-color: var(--primary); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sec { background: #eee; color: #333; }
        .btn-clean { background: var(--yellow); color: #000; }
        .btn-danger { background: var(--red); color: white; margin-top: 10px; width: 100%; }

    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="app-title">PRO BOOKING PMS</div>
        <div class="app-date" id="headDate">--/--</div>
    </div>
    <button class="btn-add-room" onclick="openRoomModal()">+ PHÒNG</button>
</header>

<div class="app-container">
    <div class="sidebar" id="sidebarRooms"></div>
    <div class="timeline">
        <div class="timeline-head" id="dateTimeline"></div>
        <div class="booking-rows" id="bookingGrid"></div>
    </div>
</div>

<div class="modal-overlay" id="bookingModal">
    <div class="modal-inner">
        <div class="modal-head">ĐẶT PHÒNG <span onclick="closeModals()" style="cursor:pointer">&times;</span></div>
        <div class="modal-body">
            <div id="bookingForm">
                <div class="f-group"><label>Tên Khách</label><input type="text" id="custName" placeholder="Tên khách hàng"></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="f-group"><label>Đến (CI)</label><input type="date" id="cin"></div>
                    <div class="f-group"><label>Đi (CO)</label><input type="date" id="cout"></div>
                </div>
                <div class="f-group"><label>Tiền cọc (k)</label><input type="number" id="depositAmount" placeholder="0k"></div>
                <div class="f-group"><label>Ghi chú</label><textarea id="custNote" rows="2"></textarea></div>
                <div class="f-group">
                    <label>Trạng thái</label>
                    <select id="bStatus">
                        <option value="blue">Đã cọc (Xanh)</option>
                        <option value="purple">Cọc thiếu (Tím)</option>
                        <option value="red">Nhận phòng (Đỏ)</option>
                    </select>
                </div>
                <button class="btn btn-main" style="width:100%" onclick="saveBooking()">LƯU ĐẶT PHÒNG</button>
            </div>
            
            <div id="checkoutForm" style="display:none">
                <div style="background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:15px;">
                    <h3 id="viewName" style="margin:0; font-size:18px;"></h3>
                    <p id="viewDetail" style="font-size:13px; color:#666; margin:5px 0 0 0;"></p>
                </div>
                <div class="btn-group">
                    <button id="btnIn" class="btn btn-main" style="background:#34c759;" onclick="convertToRed()">XÁC NHẬN CHECK-IN (Đỏ)</button>
                    <button id="btnOut" class="btn btn-clean" onclick="checkOut()">CHECK-OUT (Dọn dẹp)</button>
                </div>
                <button class="btn btn-danger" style="background:#888" onclick="deleteBooking()">XÓA BỎ ĐẶT PHÒNG</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="roomModal">
    <div class="modal-inner">
        <div class="modal-head">QUẢN LÝ PHÒNG <span onclick="closeModals()" style="cursor:pointer">&times;</span></div>
        <div class="modal-body">
            <div class="f-group"><label>Số phòng / Tên</label><input type="text" id="roomId" placeholder="VD: P.105"></div>
            <div class="f-group"><label>Giá mỗi đêm (k)</label><input type="number" id="roomPrice" placeholder="VD: 500k"></div>
            
            <div class="btn-group">
                <button class="btn btn-sec" onclick="closeModals()">HỦY</button>
                <button class="btn btn-main" onclick="saveRoom()">THÊM MỚI</button>
            </div>

            <button id="btnDeleteRoom" class="btn btn-danger" style="display:none" onclick="deleteRoom()">XÓA PHÒNG KHỎI HỆ THỐNG</button>
        </div>
    </div>
</div>

<script>
    // DATA MẪU (Thay database)
    let rooms = [
        { id: "P.101", p: 350, status: "clean" }, { id: "P.102", p: 450, status: "clean" },
        { id: "P.201", p: 600, status: "clean" }, { id: "VIP.1", p: 1200, status: "clean" }
    ];
    let bookings = [];
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('headDate').innerText = today.split('-').reverse().slice(0,2).join('/');

    function init() {
        renderSidebar();
        renderCalendar();
    }

    // --- RENDER SIDEBAR & CHẤM THÔNG MINH ---
    function renderSidebar() {
        const sb = document.getElementById('sidebarRooms');
        sb.innerHTML = '<div class="sb-head">PHÒNG</div>';
        rooms.forEach(r => {
            const activeB = bookings.find(b => b.room === r.id && today >= b.start && today <= b.end);
            let color = "var(--green)"; // Mặc định Trống (Xanh lá)
            if (r.status === "dirty") color = "var(--yellow)";
            else if (activeB) color = `var(--${activeB.t})`; // Theo màu booking

            sb.innerHTML += `
                <div class="room-card" onclick="openEditRoom('${r.id}')">
                    <div class="room-id">${r.id}</div>
                    <div class="room-price">${r.p}k</div>
                    <div class="status-led" style="background:${color}"></div>
                </div>`;
        });
    }

    // --- RENDER LỊCH (GRID CHẾ ĐỘ NÉN) ---
    function renderCalendar() {
        const head = document.getElementById('dateTimeline');
        const grid = document.getElementById('bookingGrid');
        head.innerHTML = ''; grid.innerHTML = '';

        let dates = [];
        for(let i = -1; i < 28; i++) {
            let d = new Date(); d.setDate(new Date().getDate() + i);
            const ds = d.toISOString().split('T')[0];
            dates.push(ds);
            head.innerHTML += `<div class="time-cell ${ds===today?'today':''}">
                <span>T${(d.getDay()===0?8:d.getDay()+1)}</span><b>${d.getDate()}/${d.getMonth()+1}</b>
            </div>`;
        }

        rooms.forEach(r => {
            let row = `<div class="row">`;
            dates.forEach(d => {
                const b = bookings.find(bk => bk.room === r.id && d >= bk.start && d <= bk.end);
                if (b) {
                    const isStart = d === b.start;
                    row += `
                        <div class="cell" onclick="openBookingManage('${b.id}')">
                            <div class="booking-bar bg-${b.t}">
                                <span class="bar-name">${isStart ? b.n : ''}</span>
                            </div>
                        </div>`;
                } else if(r.status === "dirty" && d === today) {
                    row += `<div class="cell" onclick="toggleCleanRoom('${r.id}')"><div class="booking-bar bg-yellow">DỌN</div></div>`;
                } else {
                    row += `<div class="cell" onclick="openNewBooking('${r.id}', '${d}')"></div>`;
                }
            });
            grid.innerHTML += row + `</div>`;
        });
    }

    // --- LOGIC ĐẶT PHÒNG ---
    let curR = "", curB = "";
    function openNewBooking(rid, d) {
        curR = rid;
        document.getElementById('bookingForm').style.display = 'block';
        document.getElementById('checkoutForm').style.display = 'none';
        document.getElementById('cin').value = d;
        document.getElementById('cout').value = d;
        document.getElementById('bookingModal').style.display = 'flex';
    }

    function openBookingManage(bid) {
        curB = bid;
        const b = bookings.find(x => x.id == bid);
        const nights = Math.ceil((new Date(b.end) - new Date(b.start)) / (1000*60*60*24));
        const totalPrice = rooms.find(r=>r.id===b.room).p * nights;

        document.getElementById('viewName').innerText = b.n;
        document.getElementById('viewDetail').innerText = `Phòng: ${b.room}\nLịch: ${b.start.split('-').reverse().join('/')} -> ${b.end.split('-').reverse().join('/')} (${nights} đêm)\nDoanh thu: ${totalPrice.toLocaleString()}k | Đã cọc: ${Number(b.d).toLocaleString()}k`;
        
        // Hiện nút Check-in nếu chưa Đỏ
        document.getElementById('btnIn').style.display = b.t !== 'red' ? 'block' : 'none';
        // Hiện nút Check-out nếu đã Đỏ
        document.getElementById('btnOut').style.display = b.t === 'red' ? 'block' : 'none';

        document.getElementById('bookingForm').style.display = 'none';
        document.getElementById('checkoutForm').style.display = 'block';
        document.getElementById('bookingModal').style.display = 'flex';
    }

    function convertToRed() {
        const b = bookings.find(x => x.id == curB);
        b.t = 'red';
        init(); closeModals();
    }

    function checkOut() {
        const b = bookings.find(x => x.id == curB);
        if (confirm(`Check-out cho ${b.n}? Phòng ${b.room} sẽ chuyển sang Màu vàng (Chờ dọn).`)) {
            const r = rooms.find(room => room.id === b.room);
            r.status = "dirty"; // Chuyển phòng sang bẩn
            bookings = bookings.filter(x => x.id != curB);
            init(); closeModals();
        }
    }

    function deleteBooking() {
        if(confirm("Xóa lịch đặt này?")) {
            bookings = bookings.filter(x => x.id != curB);
            init(); closeModals();
        }
    }

    function toggleCleanRoom(rid) {
        const r = rooms.find(x => x.id === rid);
        if(confirm(`Phòng ${rid} dọn xong?`)) {
            r.status = "clean";
            init();
        }
    }

    // --- LOGIC CẤU HÌNH PHÒNG: THÊM & XÓA PHÒNG ---
    function openRoomModal() {
        curR = "";
        document.getElementById('roomId').value = "";
        document.getElementById('roomPrice').value = "";
        document.getElementById('btnDeleteRoom').style.display = 'none';
        document.getElementById('roomModal').style.display = 'flex';
    }

    function openEditRoom(rid) {
        curR = rid;
        const r = rooms.find(x => x.id === rid);
        if(r.status === "dirty") {
            toggleCleanRoom(rid); return; // Nếu vàng thì dọn, không mở modal
        }
        document.getElementById('roomId').value = r.id;
        document.getElementById('roomPrice').value = r.p;
        document.getElementById('btnDeleteRoom').style.display = 'block'; // Hiện nút xóa
        document.getElementById('roomModal').style.display = 'flex';
    }

    function saveRoom() {
        const id = document.getElementById('roomId').value;
        const price = document.getElementById('roomPrice').value;
        if(!id || !price) return alert("Vui lòng nhập đủ tên phòng và giá!");
        
        if (curR) { // Sửa phòng
            const r = rooms.find(x => x.id === curR);
            r.id = id; r.p = parseInt(price);
        } else { // Thêm mới
            if(rooms.some(r => r.id === id)) return alert("Tên phòng đã tồn tại!");
            rooms.push({id, p: parseInt(price), status:"clean"});
        }
        init(); closeModals();
    }

    function deleteRoom() {
        if (confirm(`CHÚ Ý: Bạn sắp xóa vĩnh viễn phòng ${curR}? Mọi lịch đặt của phòng này sẽ bị mất.`)) {
            rooms = rooms.filter(x => x.id !== curR);
            init(); closeModals();
        }
    }

    function saveBooking() {
        const name = document.getElementById('custName').value;
        if(!name) return alert("Nhập tên khách!");
        bookings.push({
            id: Date.now(), room: curR, n: name,
            start: document.getElementById('cin').value,
            end: document.getElementById('cout').value,
            d: document.getElementById('depositAmount').value,
            t: document.getElementById('bStatus').value
        });
        init(); closeModals();
    }

    function closeModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        document.getElementById('custName').value = "";
    }

    init();
</script>
</body>
</html>
