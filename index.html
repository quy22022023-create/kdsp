<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Infinity Booking PMS</title>
    <style>
        :root {
            --brand: #2563eb; --brand-dark: #1e40af; --accent: #f59e0b;
            --success: #10b981; --danger: #ef4444; --bg-main: #f1f5f9;
            --text-title: #0f172a; --text-body: #64748b; --border: #e2e8f0;
            --safe-top: env(safe-area-inset-top, 20px);
            --header-h: 80px;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg-main); overflow: hidden; }

        /* --- HEADER CẢI TIẾN: CHỐNG CHE KHUẤT & ĐIỀU HƯỚNG --- */
        header {
            background: #ffffff; position: fixed; top: 0; left: 0; right: 0;
            height: calc(var(--header-h) + var(--safe-top));
            padding: var(--safe-top) 15px 0 15px;
            display: flex; flex-direction: column; justify-content: center;
            z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .nav-month { 
            display: flex; align-items: center; gap: 15px; background: #f8fafc; 
            padding: 5px 15px; border-radius: 20px; border: 1px solid var(--border);
            margin-top: 5px; align-self: flex-start;
        }
        .nav-btn { background: none; border: none; font-size: 18px; font-weight: bold; color: var(--brand); cursor: pointer; padding: 0 5px; }
        .current-month-label { font-size: 14px; font-weight: 800; color: var(--text-title); min-width: 100px; text-align: center; }

        /* --- LAYOUT --- */
        main {
            display: grid; grid-template-columns: 100px 1fr;
            margin-top: calc(var(--header-h) + var(--safe-top));
            height: calc(100vh - (var(--header-h) + var(--safe-top)));
            background: #fff; overflow: hidden;
        }

        /* Sidebar Phòng */
        .room-col { background: #fff; border-right: 1px solid var(--border); overflow-y: auto; scrollbar-width: none; }
        .room-col::-webkit-scrollbar { display: none; }
        .corner { height: 50px; position: sticky; top: 0; background: #fff; z-index: 20; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
        
        .room-box {
            height: 85px; padding: 10px; border-bottom: 1px solid #f1f5f9;
            display: flex; flex-direction: column; justify-content: center; position: relative;
        }
        .room-name { font-weight: 800; font-size: 15px; color: var(--brand-dark); }
        .room-p { font-size: 11px; color: var(--text-body); font-weight: 600; }
        .dot { width: 8px; height: 8px; border-radius: 50%; position: absolute; top: 12px; right: 10px; }

        /* Lịch Grid */
        .grid-area { overflow: auto; position: relative; scroll-behavior: smooth; }
        .grid-head { display: flex; height: 50px; background: #fff; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
        .day-cell {
            min-width: 65px; flex-shrink: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 10px; border-right: 1px solid #f1f5f9;
        }
        .day-cell b { font-size: 13px; color: var(--text-title); }
        .day-cell.is-today { background: #eff6ff; color: var(--brand); border-bottom: 3px solid var(--brand); }

        .grid-row { display: flex; height: 85px; }
        .grid-cell {
            min-width: 65px; flex-shrink: 0; border-right: 1px solid #f8fafc;
            border-bottom: 1px solid #f8fafc; display: flex; align-items: center; padding: 3px;
        }

        /* Booking Tags */
        .tag {
            width: 100%; height: 85%; border-radius: 8px; display: flex; flex-direction: column;
            justify-content: center; padding: 6px; color: white; font-size: 10px; font-weight: 600;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .tag-title { font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .bg-red { background: linear-gradient(135deg, #f87171, #ef4444); }
        .bg-blue { background: linear-gradient(135deg, #60a5fa, #2563eb); }
        .bg-purple { background: linear-gradient(135deg, #a78bfa, #8b5cf6); }
        .bg-dirty { background: #fef3c7; color: #92400e !important; border: 1px dashed #f59e0b; font-weight: 800; text-align: center; justify-content: center; }

        /* MODAL */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px); z-index: 2000; align-items: flex-end; justify-content: center;
        }
        .modal-body {
            background: white; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0;
            padding: 20px; animation: slideUp 0.3s ease-out;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .f-item { margin-bottom: 12px; }
        .f-item label { display: block; font-size: 11px; font-weight: 800; color: var(--text-body); margin-bottom: 4px; }
        .f-item input, .f-item select { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; }
        
        .btn-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; }
        .btn-ok { background: var(--brand); color: white; }
        .btn-no { background: #f1f5f9; color: var(--text-body); }
        .btn-del { background: #fef2f2; color: var(--danger); grid-column: span 2; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div style="font-weight: 900; font-size: 16px; color: var(--brand);">BOOKING PRO V7</div>
        <button class="btn-ok" style="padding: 6px 12px; font-size: 11px;" onclick="openAddRoom()">+ PHÒNG</button>
    </div>
    <div class="nav-month">
        <button class="nav-btn" onclick="changeMonth(-1)">&#10094;</button>
        <div class="current-month-label" id="monthLabel">THÁNG 03/2026</div>
        <button class="nav-btn" onclick="changeMonth(1)">&#10095;</button>
    </div>
</header>

<main>
    <div class="room-col" id="roomCol">
        <div class="corner">PHÒNG</div>
    </div>
    <div class="grid-area" id="gridArea">
        <div class="grid-head" id="gridHead"></div>
        <div id="gridBody"></div>
    </div>
</main>

<div class="modal" id="bookModal">
    <div class="modal-body">
        <h2 id="modalTitle" style="margin:0 0 15px 0; font-size: 18px;">Đặt phòng</h2>
        <div id="createForm">
            <div class="f-item"><label>Tên khách hàng</label><input type="text" id="mName" placeholder="VD: Anh Nam"></div>
            <div style="display:flex; gap:10px;">
                <div class="f-item" style="flex:1"><label>Đến</label><input type="date" id="mIn"></div>
                <div class="f-item" style="flex:1"><label>Đi</label><input type="date" id="mOut"></div>
            </div>
            <div class="f-item">
                <label>Trạng thái</label>
                <select id="mType">
                    <option value="blue">Đã đặt cọc (Xanh)</option>
                    <option value="purple">Cọc thiếu (Tím)</option>
                    <option value="red">Check-in (Đỏ)</option>
                </select>
            </div>
            <button class="btn btn-ok" style="width:100%" onclick="saveBooking()">LƯU ĐẶT PHÒNG</button>
        </div>

        <div id="manageForm" style="display:none">
            <div id="viewInfo" style="background:#f8fafc; padding:15px; border-radius:12px; margin-bottom:15px;"></div>
            <div class="btn-box">
                <button id="btnIn" class="btn btn-ok" style="background:var(--success)" onclick="updateStatus('red')">CHECK-IN</button>
                <button id="btnOut" class="btn btn-ok" style="background:var(--accent)" onclick="doCheckout()">CHECK-OUT</button>
                <button class="btn btn-no" onclick="deleteBooking()" style="color:var(--danger)">XÓA LỊCH</button>
                <button class="btn btn-no" onclick="closeM()">ĐÓNG</button>
            </div>
        </div>
        <button class="btn btn-no" style="width:100%; margin-top:10px;" onclick="closeM()">HỦY BỎ</button>
    </div>
</div>

<script>
    let rooms = [
        { id: "P.101", p: 350000, s: "clean" }, { id: "P.102", p: 450000, s: "clean" },
        { id: "P.201", p: 600000, s: "dirty" }, { id: "VIP.1", p: 1200000, s: "clean" }
    ];
    let bookings = [];
    let currentViewDate = new Date(); // Ngày đang xem
    const realToday = new Date().toISOString().split('T')[0];

    function init() {
        renderSidebar();
        renderGrid();
        updateMonthLabel();
    }

    function updateMonthLabel() {
        const month = currentViewDate.getMonth() + 1;
        const year = currentViewDate.getFullYear();
        document.getElementById('monthLabel').innerText = `THÁNG ${month < 10 ? '0'+month : month}/${year}`;
    }

    function changeMonth(val) {
        currentViewDate.setMonth(currentViewDate.getMonth() + val);
        init();
    }

    function renderSidebar() {
        const col = document.getElementById('roomCol');
        col.innerHTML = '<div class="corner">PHÒNG</div>';
        rooms.forEach(r => {
            const hasGuest = bookings.find(b => b.r === r.id && realToday >= b.start && realToday <= b.end);
            let color = "#10b981";
            if (r.s === "dirty") color = "#f59e0b";
            else if (hasGuest) color = hasGuest.t === 'red' ? "#ef4444" : "#2563eb";

            col.innerHTML += `
                <div class="room-box" onclick="editRoom('${r.id}')">
                    <div class="room-name">${r.id}</div>
                    <div class="room-p">${(r.p/1000)}k</div>
                    <div class="dot" style="background:${color}"></div>
                </div>`;
        });
    }

    function renderGrid() {
        const head = document.getElementById('gridHead');
        const body = document.getElementById('gridBody');
        head.innerHTML = ''; body.innerHTML = '';

        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        let dateArray = [];
        for (let i = 1; i <= daysInMonth; i++) {
            const d = new Date(year, month, i);
            const ds = d.toISOString().split('T')[0];
            dateArray.push(ds);
            const isToday = ds === realToday ? 'is-today' : '';
            head.innerHTML += `
                <div class="day-cell ${isToday}" id="day-${ds}">
                    <span>T${d.getDay() === 0 ? 8 : d.getDay() + 1}</span>
                    <b>${i}/${month + 1}</b>
                </div>`;
        }

        rooms.forEach(r => {
            let row = `<div class="grid-row">`;
            dateArray.forEach(d => {
                const b = bookings.find(bk => bk.r === r.id && d >= bk.start && d <= bk.end);
                if (b) {
                    row += `<div class="grid-cell" onclick="openManage('${b.id}')">
                        <div class="tag bg-${b.t}">${d === b.start ? `<span class="tag-title">${b.n}</span>` : ''}</div>
                    </div>`;
                } else if (r.s === "dirty" && d === realToday) {
                    row += `<div class="grid-cell" onclick="clearDirty('${r.id}')"><div class="tag bg-dirty">DỌN</div></div>`;
                } else {
                    row += `<div class="grid-cell" onclick="openAdd('${r.id}', '${d}')"></div>`;
                }
            });
            body.innerHTML += row + `</div>`;
        });

        // Tự động cuộn đến ngày hôm nay nếu ở tháng hiện tại
        setTimeout(() => {
            const todayEl = document.getElementById(`day-${realToday}`);
            if (todayEl) todayEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }, 100);
    }

    // LOGIC THAO TÁC
    let curR = "", curB = "";

    function openAdd(rid, d) {
        curR = rid;
        document.getElementById('mIn').value = d;
        document.getElementById('mOut').value = d;
        document.getElementById('createForm').style.display = 'block';
        document.getElementById('manageForm').style.display = 'none';
        document.getElementById('bookModal').style.display = 'flex';
    }

    function openManage(bid) {
        curB = bid;
        const b = bookings.find(x => x.id == bid);
        document.getElementById('viewInfo').innerHTML = `<b>${b.n}</b><br><small>Phòng: ${b.r} | ${b.start} -> ${b.end}</small>`;
        document.getElementById('btnIn').style.display = b.t !== 'red' ? 'block' : 'none';
        document.getElementById('btnOut').style.display = b.t === 'red' ? 'block' : 'none';
        document.getElementById('createForm').style.display = 'none';
        document.getElementById('manageForm').style.display = 'block';
        document.getElementById('bookModal').style.display = 'flex';
    }

    function saveBooking() {
        const name = document.getElementById('mName').value;
        if (!name) return alert("Nhập tên khách!");
        bookings.push({
            id: Date.now(), r: curR, n: name,
            start: document.getElementById('mIn').value,
            end: document.getElementById('mOut').value,
            t: document.getElementById('mType').value
        });
        init(); closeM();
    }

    function updateStatus(type) {
        bookings.find(x => x.id == curB).t = type;
        init(); closeM();
    }

    function doCheckout() {
        const b = bookings.find(x => x.id == curB);
        rooms.find(r => r.id === b.r).s = "dirty";
        bookings = bookings.filter(x => x.id != curB);
        init(); closeM();
    }

    function clearDirty(rid) {
        if(confirm("Phòng dọn xong?")) { rooms.find(x => x.id === rid).s = "clean"; init(); }
    }

    function deleteBooking() {
        if(confirm("Xóa lịch này?")) { bookings = bookings.filter(x => x.id != curB); init(); closeM(); }
    }

    function openAddRoom() {
        const id = prompt("Tên phòng:");
        const p = prompt("Giá (VNĐ):");
        if(id && p) { rooms.push({id, p: parseInt(p), s:"clean"}); init(); }
    }

    function editRoom(rid) {
        if(confirm(`Xóa vĩnh viễn phòng ${rid}?`)) { rooms = rooms.filter(x => x.id !== rid); init(); }
    }

    function closeM() { 
        document.getElementById('bookModal').style.display = 'none'; 
        document.getElementById('mName').value = "";
    }

    init();
</script>
</body>
</html>
