<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PMS ENTERPRISE - Hotel Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --p-blue: #00459e; --p-gold: #feba02; --p-red: #d4111e;
            --s-green: #008009; --s-purple: #8e44ad; --bg: #f4f7f6;
            --sidebar-w: 120px; --row-h: 105px; 
            --cell-w: 100px;
            --border: #e0e0e0; --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; font-family: 'Inter', -apple-system, sans-serif; }
        
        /* Tối ưu hóa UI cho iOS/Android: Khử bóng mờ và viền mặc định */
        input, select, button, textarea {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            margin: 0;
        }

        body { 
            margin: 0; background: var(--bg); overflow: hidden; 
            height: 100vh; height: 100dvh; display: flex; flex-direction: column; 
            -webkit-text-size-adjust: 100%;
        }

        /* --- HEADER & DASHBOARD --- */
        header {
            background: #fff; height: 75px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; border-bottom: 2px solid var(--p-blue); z-index: 1000; box-shadow: var(--shadow);
            flex-shrink: 0; 
        }
        .brand { font-size: 22px; font-weight: 900; color: var(--p-blue); letter-spacing: -1px; white-space: nowrap; }
        .stats-bar { display: flex; gap: 15px; }
        .stat-card { background: var(--bg); padding: 8px 12px; border-radius: 10px; border-left: 4px solid var(--p-blue); }
        .stat-card small { display: block; font-size: 10px; color: #666; font-weight: bold; }
        .stat-card b { font-size: 16px; color: var(--p-blue); }
        
        .header-tools { display: flex; gap: 8px; align-items: center; overflow-x: auto; white-space: nowrap; padding: 5px 0; scrollbar-width: none; }
        .header-tools::-webkit-scrollbar { display: none; }

        .month-nav { display: flex; align-items: center; gap: 2px; background: var(--bg); padding: 4px; border-radius: 8px; border: 1px solid var(--border); position: relative; }
        .month-nav button { background: none; border: none; font-size: 16px; cursor: pointer; padding: 5px 8px; color: var(--p-blue); font-weight: bold; position: relative; z-index: 2; }
        .month-nav button:hover { background: #e0e0e0; border-radius: 5px; }
        .month-label { font-size: 15px; font-weight: 800; color: #333; min-width: 65px; text-align: center; }
        .month-nav input[type="month"] { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 1; }

        /* --- LAYOUT GRID --- */
        .pms-wrapper { display: grid; grid-template-columns: var(--sidebar-w) 1fr; flex: 1; overflow: hidden; }

        /* Sidebar Phòng */
        .rooms-aside { background: #fff; border-right: 1px solid var(--border); overflow-y: auto; scroll-behavior: smooth; }
        .room-head { height: 50px; background: #fafafa; border-bottom: 1px solid var(--border); position: sticky; top:0; z-index: 10; }
        
        .room-item {
            height: var(--row-h); border-bottom: 1px solid #eee; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative; cursor: pointer; transition: 0.3s;
            padding: 5px;
        }
        .room-item:hover { background: #f0f7ff; }
        .room-item b { font-size: 18px; line-height: 1.1; }
        .room-item .lb-code { color: var(--s-purple); font-weight: 900; font-size: 13px; margin: 3px 0; background: #f4e8f9; padding: 2px 6px; border-radius: 4px;}
        .room-item .r-price { font-size: 11px; font-weight: bold; color: #333; }
        .room-item .r-notes { font-size: 9px; color: #666; text-align: center; margin-top: 2px; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .badge-status { 
            width: 14px; height: 14px; border-radius: 50%; position: absolute; top: 8px; right: 8px; 
            box-shadow: 0 0 4px rgba(0,0,0,0.3); border: 2px solid #fff; cursor: pointer; transition: 0.2s;
        }
        .badge-status:hover { transform: scale(1.3); }

        /* Timeline & Grid */
        .timeline-view { overflow: auto; background: white; position: relative; }
        .grid-header { display: flex; height: 50px; position: sticky; top: 0; z-index: 50; background: #fff; border-bottom: 1px solid var(--border); }
        .date-unit {
            min-width: var(--cell-w); border-right: 1px solid #eee; flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px;
        }
        .date-unit.today { background: #fff9db; border-bottom: 3px solid var(--p-gold); }

        .grid-body { display: inline-block; min-width: 100%; }
        .grid-row { display: flex; height: var(--row-h); }
        .grid-cell { 
            min-width: var(--cell-w); border-right: 1px solid #f8f8f8; border-bottom: 1px solid #f8f8f8;
            position: relative; flex-shrink: 0; transition: 0.2s;
        }
        .grid-cell:hover { background: #fdfdfd; }

        /* Booking Bars & Overdue Animation */
        @keyframes pulse-overdue {
            0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 152, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
        }
        .booking-tag {
            position: absolute; height: 80%; top: 10%; border-radius: 8px; z-index: 5;
            color: white; padding: 8px; font-size: 11px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; transition: transform 0.2s;
        }
        .booking-tag:active { transform: scale(0.95); }
        .tag-blue { background: linear-gradient(135deg, #0071c2, #00459e); }
        .tag-purple { background: linear-gradient(135deg, #a332c3, #6c5ce7); }
        .tag-red { background: linear-gradient(135deg, #d4111e, #b20a15); }
        .tag-grey { background: linear-gradient(135deg, #7f8c8d, #95a5a6); opacity: 0.85; }
        .tag-overdue { border: 2px solid #ff9800 !important; animation: pulse-overdue 1.5s infinite; z-index: 6; }

        /* --- MODAL SYSTEM --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-box {
            background: #fff; width: 95%; max-width: 480px; border-radius: 20px;
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.3); max-height: 88vh; overflow-y: auto;
            display: flex; flex-direction: column;
        }
        .modal-header { background: var(--p-blue); color: #fff; padding: 18px; font-weight: bold; display: flex; justify-content: space-between; flex-shrink: 0; }
        .modal-content { padding: 20px 20px; overflow-y: auto; }

        .f-group { margin-bottom: 15px; }
        .f-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 6px; color: #555; }
        
        .f-group input[type="text"], .f-group input[type="number"], .f-group input[type="tel"], .f-group select {
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px !important; outline: none; transition: 0.3s; background: #fff; box-sizing: border-box;
        }
        .f-group input:focus, .f-group select:focus { border-color: var(--p-blue); }

        /* Flex Container chống tràn (Chữa lỗi iPhone) */
        .flex-row { display: flex; gap: 10px; width: 100%; }
        .flex-col { flex: 1; min-width: 0; } /* min-width: 0; là key để flexbox không bị bung viền */

        /* Fix Date Input for iOS Safari */
        .date-wrapper { position: relative; width: 100%; height: 47px; border: 2px solid #eee; border-radius: 10px; background: #fff; display: flex; align-items: center; padding: 0 12px; transition: 0.3s; box-sizing: border-box; }
        .date-wrapper:focus-within { border-color: var(--p-blue); }
        .date-label { font-size: 16px; color: #000; pointer-events: none; }
        .date-wrapper input[type="date"] { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; margin: 0; padding: 0;}

        /* Bill Table */
        .bill-box { background: #fdfaf0; border: 1px solid #fcebb6; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .bill-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #444; }
        .bill-row.total { border-top: 1px dashed #ccc; padding-top: 8px; font-weight: bold; font-size: 16px; color: var(--p-red); margin-bottom: 0;}

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 14px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 14px; white-space: nowrap; text-align: center; display: inline-block; box-sizing: border-box; }
        .btn:active { transform: scale(0.98); }
        .btn-p { background: var(--p-blue); color: #fff; }
        .btn-s { background: var(--s-green); color: #fff; }
        .btn-d { background: var(--p-red); color: #fff; }
        .btn-cancel { background: #eee; color: #333; grid-column: span 2; }

        /* Excel-like Table cho Minibar */
        .excel-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 15px;}
        .excel-table th { background: #f3f2f1; border: 1px solid #c8c6c4; padding: 10px; font-weight: 600; color: #323130; text-align: left; }
        .excel-table td { border: 1px solid #c8c6c4; padding: 0; background: #fff; position: relative; }
        .excel-table input { width: 100%; height: 100%; border: none; padding: 10px; outline: none; background: transparent; font-size: 16px !important; box-sizing: border-box; }
        .excel-table input:focus { box-shadow: inset 0 0 0 2px var(--p-blue); }
        .excel-table button { width: 100%; height: 100%; border: none; padding: 10px; cursor: pointer; font-size: 14px; box-sizing: border-box;}

        /* Dropdown Minibar đặc chế không tràn */
        .mb-select { flex: 2; min-width: 0; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 16px !important; background: #fff; outline:none; text-overflow: ellipsis; }
        .mb-qty { flex: 1; min-width: 0; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 16px !important; text-align: center; outline:none; background:#fff; }
        .mb-add-btn { padding: 0 15px; font-size: 18px; font-weight:bold; flex-shrink: 0; border-radius: 8px; background: var(--s-green); color: #fff; border: none; cursor: pointer; }

        @media (max-width: 1024px) {
            .brand { display: none; } 
        }
        @media (max-width: 768px) {
            :root { --sidebar-w: 90px; --cell-w: 70px; --row-h: 110px; } 
            .stats-bar { display: none; }
            .header-tools { width: 100%; justify-content: flex-start; padding: 5px; }
            .header-tools .btn { padding: 10px !important; font-size: 12px !important; }
            #roomFilter { display: none; } 
            .month-nav input[type="month"] { width: 100px; }
            .modal-content { padding: 15px; } /* Thu nhỏ lề cho đt nhỏ */
        }
        /* Phân luồng Grid 1 cột nếu màn hình quá hẹp để nút bấm không đè nhau */
        @media (max-width: 380px) {
            .btn-row { grid-template-columns: 1fr; }
            .btn-cancel { grid-column: 1; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">ULTIMATE PMS</div>
    <div class="stats-bar" id="topStats"></div>
    <div class="header-tools">
        
        <div class="month-nav">
            <button onclick="changeMonth(-1)">◀</button>
            <span class="month-label" id="monthLabel"></span>
            <input type="month" id="monthPicker" onchange="selectMonth()">
            <button onclick="changeMonth(1)">▶</button>
        </div>

        <select id="roomFilter" class="btn" style="background:#f4f7f6; color:#333; padding: 10px; border: 1px solid var(--border);" onchange="applyFilter()">
            <option value="all">Hiển thị: Tất cả</option>
            <option value="clean">Phòng sạch</option>
            <option value="dirty">Phòng chờ dọn</option>
        </select>
        
        <button class="btn" style="background:var(--s-purple); color:white; padding: 10px 15px; font-size: 13px;" onclick="openSearchModal()">🔍 TÌM PHÒNG</button>
        <button class="btn btn-s" style="padding: 10px 15px; font-size: 13px;" onclick="openMinibarCatalog()">📦 DỊCH VỤ</button>
        <button class="btn btn-s" style="background: #27ae60; padding: 10px 15px; font-size: 13px;" onclick="exportCSV()">📥 CSV</button>
        <button class="btn btn-p" style="padding: 10px 15px; font-size: 13px;" onclick="addRoom()">+ PHÒNG</button>
    </div>
</header>

<div class="pms-wrapper">
    <aside class="rooms-aside" id="sidebarRooms"></aside>
    <main class="timeline-view" id="mainTimeline">
        <div class="grid-header" id="dateHeader"></div>
        <div class="grid-body" id="gridCanvas"></div>
    </main>
</div>

<div class="modal" id="pmsModal">
    <div class="modal-box">
        <div class="modal-header">
            <span id="mTitle">Thông tin phòng</span>
            <span onclick="closeModal()" style="cursor:pointer; font-size: 18px;">✕</span>
        </div>
        <div class="modal-content" id="mContent"></div>
    </div>
</div>

<script>
    // --- KHỞI TẠO SUPABASE ---
    const supabaseUrl = 'https://awxkvzkigfxoidnvmxew.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3eGt2emtpZ2Z4b2lkbnZteGV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzUwNTcsImV4cCI6MjA4NTg1MTA1N30.eBGQc3rp9-H4ipsCDhUdLTC7aJB6HHDh6CKwsvV9b3A';
    const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // --- CÁC HÀM HỖ TRỢ XỬ LÝ NGÀY GIỜ ---
    function getLocalISODate(d) {
        const offset = d.getTimezoneOffset() * 60000;
        return new Date(d.getTime() - offset).toISOString().substring(0, 10);
    }

    function getCurrentTimeStr() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        return `${hh}:${min}`;
    }

    function fmt(isoDateStr, includeTime = false) {
        if(!isoDateStr) return '';
        const cleanStr = isoDateStr.replace(' ', 'T');
        const parts = cleanStr.split('T');
        const datePart = parts[0]; 
        const dArr = datePart.split('-');
        if (dArr.length !== 3) return cleanStr; 
        
        const dd = parseInt(dArr[2]); 
        const mm = parseInt(dArr[1]);
        const yyyy = dArr[0];
        
        if (includeTime && parts.length > 1) {
            const timePart = parts[1].substring(0, 5); 
            return `${timePart} - ${dd}/${mm}/${yyyy}`;
        }
        return `${dd}/${mm}/${yyyy}`;
    }

    function checkOverdue(booking) {
        if (booking.type === 'grey') return false; 
        if (!booking.end) return false;
        
        const nowMs = new Date().getTime();
        const endMs = new Date(booking.end.replace(' ', 'T')).getTime();
        return nowMs > endMs; 
    }

    // --- DATA ENGINE ---
    let rooms = [];
    let bookings = [];
    let services = []; 
    
    let currentFilter = 'all';
    let searchCriteria = null; 

    const realTodayStr = getLocalISODate(new Date()); 
    let currentViewDate = new Date();
    currentViewDate.setHours(12, 0, 0, 0); 

    // --- HÀM TẢI VÀ ĐỒNG BỘ DỮ LIỆU TỪ SUPABASE ---
    async function loadData() {
        const { data: rms, error: e1 } = await _supabase.from('rooms').select('*').order('id', { ascending: true });
        const { data: bks, error: e2 } = await _supabase.from('bookings').select('*');
        const { data: svs, error: e3 } = await _supabase.from('services').select('*').order('name', { ascending: true });
        
        if (e1 || e2 || e3) {
            console.error("Lỗi tải dữ liệu Supabase:", e1 || e2 || e3);
        } else {
            rooms = rms || [];
            services = svs || []; 
            bookings = (bks || []).map(b => {
                if (b.start && b.start.includes(' ')) b.start = b.start.replace(' ', 'T');
                if (b.end && b.end.includes(' ')) b.end = b.end.replace(' ', 'T');
                return b;
            });
            render();
        }
    }

    // --- QUẢN LÝ MINIBAR CATALOG ĐỒNG BỘ SUPABASE ---
    window.openMinibarCatalog = function() {
        let html = `
            <div style="margin-bottom: 10px; font-size: 13px; color: #444;">Nhập trực tiếp vào ô để sửa dữ liệu. Hệ thống sẽ tự động đồng bộ lên Database.</div>
            <div style="overflow-x:auto;">
            <table class="excel-table">
                <tr>
                    <th>Tên mặt hàng</th>
                    <th>Giá bán (VNĐ)</th>
                    <th style="width: 50px; text-align:center;">Xóa</th>
                </tr>`;
        services.forEach((item) => {
            html += `<tr>
                <td><input type="text" value="${item.name}" onchange="updateCatalog('${item.id}', 'name', this.value)"></td>
                <td><input type="number" value="${item.price}" onchange="updateCatalog('${item.id}', 'price', this.value)"></td>
                <td style="text-align: center;"><button style="background: #ffebee; color: var(--p-red);" onclick="deleteCatalog('${item.id}')">✕</button></td>
            </tr>`;
        });
        html += `<tr>
                <td><input type="text" id="newCatName" placeholder="Thêm món mới..." style="background: #f0f7ff;"></td>
                <td><input type="number" id="newCatPrice" placeholder="Giá tiền..." style="background: #f0f7ff;"></td>
                <td style="text-align: center;"><button style="background: var(--s-green); color: white; font-weight:bold;" onclick="addCatalog()">+</button></td>
            </tr>
            </table></div>
            <button class="btn btn-cancel" style="width:100%; margin-top:10px;" onclick="closeModal()">ĐÓNG LẠI</button>
        `;
        document.getElementById('mTitle').innerText = `Quản lý Danh mục Dịch vụ`;
        document.getElementById('mContent').innerHTML = html;
        document.getElementById('pmsModal').style.display = 'flex';
    }

    window.updateCatalog = async function(id, field, val) {
        if(field === 'price') val = parseInt(val) || 0;
        const { error } = await _supabase.from('services').update({ [field]: val }).eq('id', id);
        if(error) alert("Lỗi khi cập nhật món hàng!");
        else await loadData();
    }
    
    window.deleteCatalog = async function(id) {
        if(confirm("Bạn có chắc muốn xóa dịch vụ này? (Không ảnh hưởng đến hóa đơn cũ)")) {
            await _supabase.from('services').delete().eq('id', id);
            await loadData();
            openMinibarCatalog();
        }
    }

    window.addCatalog = async function() {
        let name = document.getElementById('newCatName').value.trim();
        let price = parseInt(document.getElementById('newCatPrice').value) || 0;
        if(!name) return;
        
        let newId = 'SV' + Date.now();
        const { error } = await _supabase.from('services').insert([{ id: newId, name: name, price: price }]);
        if(error) {
            alert("Lỗi! Cần đảm bảo đã tạo bảng 'services' trên Supabase.");
        } else {
            await loadData();
            openMinibarCatalog();
        }
    }

    // --- HÀM ĐIỀU HƯỚNG THÁNG ---
    function changeMonth(delta) {
        currentViewDate.setMonth(currentViewDate.getMonth() + delta);
        render();
    }

    function selectMonth() {
        const val = document.getElementById('monthPicker').value;
        if (val) {
            const parts = val.split('-');
            currentViewDate.setFullYear(parseInt(parts[0]));
            currentViewDate.setMonth(parseInt(parts[1]) - 1);
            render();
        }
    }

    // --- RENDERING ---
    function render() {
        renderSidebar();
        renderTimeline();
        renderDashboard();
    }

    function applyFilter() {
        currentFilter = document.getElementById('roomFilter').value;
        if (currentFilter !== 'search') {
            searchCriteria = null;
            let opt = document.getElementById('optSearch');
            if (opt) opt.style.display = 'none';
        }
        render();
    }

    function renderDashboard() {
        const active = bookings.filter(b => {
            const bStartD = b.start ? b.start.substring(0, 10) : '';
            const bEndD = b.end ? b.end.substring(0, 10) : '';
            return realTodayStr >= bStartD && realTodayStr < bEndD && b.type === 'red';
        }).length;
        
        const totalRev = bookings.reduce((sum, b) => {
            const startCal = new Date((b.start ? b.start.substring(0, 10) : realTodayStr) + 'T00:00:00');
            const endCal = new Date((b.end ? b.end.substring(0, 10) : realTodayStr) + 'T00:00:00');
            const nights = Math.max((endCal - startCal) / 86400000, 1);
            const appliedPrice = b.price !== undefined ? b.price : (rooms.find(rm => rm.id === b.roomId)?.price || 0);
            const miniTotal = parseInt(b.minibar_total) || 0; 
            return sum + (nights * appliedPrice) + miniTotal; 
        }, 0);

        document.getElementById('topStats').innerHTML = `
            <div class="stat-card"><small>ĐANG Ở</small><b>${active}</b></div>
            <div class="stat-card"><small>TỔNG DOANH THU</small><b>${(totalRev/1000).toLocaleString()}k</b></div>
        `;
    }

    function renderSidebar() {
        const sb = document.getElementById('sidebarRooms');
        sb.innerHTML = '<div class="room-head"></div>';
        
        const filteredRooms = rooms.filter(r => {
            if (currentFilter !== 'all' && currentFilter !== 'search' && r.status !== currentFilter) return false;
            if (currentFilter === 'search' && searchCriteria) {
                const isOverlapped = bookings.some(b => b.roomId === r.id && (searchCriteria.start < b.end && searchCriteria.end > b.start));
                if (isOverlapped) return false; 
            }
            return true;
        });

        filteredRooms.forEach(r => {
            const activeBooking = bookings.find(b => {
                const bStartD = b.start ? b.start.substring(0, 10) : '';
                const bEndD = b.end ? b.end.substring(0, 10) : '';
                return b.roomId === r.id && realTodayStr >= bStartD && realTodayStr < bEndD && b.type === 'red';
            });
            
            let isDirty = r.status === 'dirty';
            let badgeColor = 'var(--s-green)'; 
            let sttText = 'Sạch - Sẵn sàng';
            
            if (activeBooking) {
                if (checkOverdue(activeBooking)) {

                    sttText = 'QUÁ GIỜ TRẢ PHÒNG!';
                } else {
                    badgeColor = 'var(--p-red)'; 
                    sttText = 'Đang có khách lưu trú';
                }
            } else if (isDirty) {
                badgeColor = 'var(--p-gold)'; 
                sttText = 'Khách đã out - Chờ dọn dẹp';
            }

            sb.innerHTML += `
                <div class="room-item" onclick="openRoomSettings('${r.id}')" title="Nhấn để mở Cài đặt phòng">

                </div>`;
        });
    }

    function renderTimeline() {
        const header = document.getElementById('dateHeader');
        const canvas = document.getElementById('gridCanvas');
        header.innerHTML = ''; canvas.innerHTML = '';

        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        document.getElementById('monthPicker').value = `${year}-${String(month + 1).padStart(2, '0')}`;
        document.getElementById('monthLabel').innerText = `${month + 1}/${year}`;

        let dateArr = [];
        for(let i = 1; i <= daysInMonth; i++) { 
            let d = new Date(year, month, i, 12, 0, 0);
            const ds = getLocalISODate(d);
            dateArr.push(ds);
            
            const isToday = ds === realTodayStr ? 'today' : '';
            const labelDate = `${d.getDate()}/${d.getMonth()+1}`;
            
            header.innerHTML += `
                <div class="date-unit ${isToday}">
                    <span>${d.toLocaleDateString('vi-VN', {weekday: 'short'})}</span>
                    <b>${labelDate}</b>
                </div>`;
        }

        const viewStartStr = dateArr[0];
        const viewEndStr = dateArr[dateArr.length - 1];

        const filteredRooms = rooms.filter(r => {
            if (currentFilter !== 'all' && currentFilter !== 'search' && r.status !== currentFilter) return false;
            if (currentFilter === 'search' && searchCriteria) {
                const isOverlapped = bookings.some(b => b.roomId === r.id && (searchCriteria.start < b.end && searchCriteria.end > b.start));
                if (isOverlapped) return false; 
            }
            return true;
        });

        filteredRooms.forEach(r => {
            const row = document.createElement('div');
            row.className = 'grid-row';
            
            dateArr.forEach(date => {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                
                const b = bookings.find(bk => {
                    const bkStartD = bk.start ? bk.start.substring(0, 10) : '';
                    const bkEndD = bk.end ? bk.end.substring(0, 10) : '';
                    return bk.roomId === r.id && (bkStartD === date || (date === viewStartStr && bkStartD < viewStartStr && bkEndD > viewStartStr));
                });

                if(b) {
                    const startCal = new Date((b.start ? b.start.substring(0, 10) : realTodayStr) + 'T00:00:00');
                    const endCal = new Date((b.end ? b.end.substring(0, 10) : realTodayStr) + 'T00:00:00');
                    const durationToRender = Math.max((endCal - startCal) / 86400000, 1);
                    
                    const width = (durationToRender * (window.innerWidth <= 768 ? 70 : 100)) - 10;
                    const label = b.type === 'grey' ? '(Đã xong)' : '';
                    const depositText = (b.deposit && b.deposit > 0) ? ` - Cọc: ${(b.deposit/1000)}k` : '';

                    const isCrossMonth = (b.start ? b.start.substring(0, 10) : '') < viewStartStr ? 'border-radius: 0 8px 8px 0; border-left: 3px dashed #fff;' : '';

                    const overdueCls = checkOverdue(b) ? ' tag-overdue' : '';

                    cell.innerHTML = `
                        <div class="booking-tag tag-${b.type}${overdueCls}" style="width: ${width}px; ${isCrossMonth}" onclick="openDetail('${b.id}')">
                            <div style="white-space:nowrap; overflow:hidden">${b.guest} ${label}</div>
                            <small>${durationToRender} đêm${depositText}</small>
                        </div>`;
                } else {
                    cell.onclick = () => openBooking(r.id, date);
                }
                row.appendChild(cell);
            });
            canvas.appendChild(row);
        });
    }

    async function saveRoomSettings(oldRid) {
        const newId = document.getElementById('fRoomId').value.trim();
        const newPrice = parseInt(document.getElementById('fRoomPrice').value) || 0;
        const newLockbox = document.getElementById('fRoomLockbox').value.trim();
        const newNotes = document.getElementById('fRoomNotes').value.trim();

        if(!newId) return alert("Tên phòng không được để trống!");
        if(newId !== oldRid && rooms.some(x => x.id === newId)) return alert("Tên phòng này đã tồn tại trong hệ thống! Vui lòng chọn tên khác.");

        if(newId !== oldRid) {
            const r = rooms.find(x => x.id === oldRid);
            await _supabase.from('rooms').insert([{ id: newId, price: newPrice, cat: r.cat || "", status: r.status, lockbox: newLockbox, notes: newNotes }]);
            await _supabase.from('bookings').update({ roomId: newId }).eq('roomId', oldRid);
            await _supabase.from('rooms').delete().eq('id', oldRid);
        } else {
            await _supabase.from('rooms').update({ price: newPrice, lockbox: newLockbox, notes: newNotes }).eq('id', oldRid);
        }
        
        closeModal(); 
        await loadData();
    }

    async function deleteRoom(rid) {
        const hasBookings = bookings.some(b => b.roomId === rid);
        let msg = `Bạn có chắc chắn muốn xóa phòng ${rid} khỏi hệ thống không?`;
        if (hasBookings) msg = `CẢNH BÁO NGUY HIỂM:\nPhòng ${rid} đang có lịch sử khách hàng!\nBạn vẫn muốn tiếp tục xóa?`;

        if(confirm(msg)) {
            await _supabase.from('bookings').delete().eq('roomId', rid); 
            await _supabase.from('rooms').delete().eq('id', rid); 
            closeModal(); 
            await loadData();
        }
    }

    async function toggleDirty(rid, event) {
        if(event) event.stopPropagation(); 
        const r = rooms.find(x => x.id === rid);
        if(r.status === 'dirty') {
            if(confirm("Xác nhận phòng " + rid + " đã được dọn sạch?")) { 
                await _supabase.from('rooms').update({ status: 'clean' }).eq('id', rid);
                await loadData(); 
            }
        } else {
            if(confirm("Đánh dấu phòng " + rid + " cần dọn dẹp?")) { 
                await _supabase.from('rooms').update({ status: 'dirty' }).eq('id', rid);
                await loadData(); 
            }
        }
    }

    async function confirmBooking(roomId) {
        const guest = document.getElementById('fName').value;
        const phone = document.getElementById('fPhone').value.trim();
        const startD = document.getElementById('fStart').value;
        const endD = document.getElementById('fEnd').value;
        const price = parseInt(document.getElementById('fPrice').value) || 0;
        const deposit = parseInt(document.getElementById('fDeposit').value) || 0;
        const type = document.getElementById('fType').value;

        if(!guest || startD >= endD) return alert("Vui lòng kiểm tra lại thông tin ngày tháng hoặc tên khách!");

        const startTimeStr = type === 'red' ? getCurrentTimeStr() : '14:00';
        let startStr = `${startD}T${startTimeStr}`;
        let endStr = `${endD}T12:00`;

        const overlap = bookings.some(b => b.roomId === roomId && (startStr < b.end && endStr > b.start));
        if(overlap) return alert("Phòng này đã có khách lưu trú trong thời gian bạn chọn!");

        const newBk = { 
            id: 'BK'+Date.now(), roomId, guest, phone, start: startStr, end: endStr, 
            type: type, price: price, deposit: deposit, minibar_total: 0, minibar_items: JSON.stringify([])
        };
        
        await _supabase.from('bookings').insert([newBk]);
        closeModal(); 
        await loadData();
    }

    window.openDetail = function(bid) {
        const b = bookings.find(x => x.id === bid);
        if(!b) return; 
        const r = rooms.find(rm => rm.id === b.roomId);
        
        let bStart = b.start && b.start.includes('T') ? b.start : (b.start || realTodayStr) + 'T14:00';
        let bEnd = b.end && b.end.includes('T') ? b.end : (b.end || realTodayStr) + 'T12:00';
        
        const dStartInput = bStart.substring(0, 10); 
        const dEndInput = bEnd.substring(0, 10);
        
        const startCal = new Date(dStartInput + 'T00:00:00');
        const endCal = new Date(dEndInput + 'T00:00:00');
        const nights = Math.max((endCal - startCal) / 86400000, 1);
        
        const appliedPrice = b.price !== undefined ? b.price : r.price;
        const deposit = b.deposit || 0;
        const roomCost = nights * appliedPrice;
        
        // --- XỬ LÝ DỮ LIỆU MINIBAR ---
        let miniItems = [];
        try { miniItems = typeof b.minibar_items === 'string' ? JSON.parse(b.minibar_items) : (b.minibar_items || []); } catch(e) { miniItems = []; }
        let miniTotal = parseInt(b.minibar_total) || 0;

                    </div>
                    
                    <div class="flex-row" style="margin-bottom: 15px;">
                        <div class="flex-col"><label style="font-size: 12px; font-weight: bold; margin-bottom: 6px; display: block;">Tên khách</label><input class="f-group" style="margin-bottom:0;" id="dName" type="text" value="${b.guest}"></div>
                        <div class="flex-col"><label style="font-size: 12px; font-weight: bold; margin-bottom: 6px; display: block;">SĐT (Dán SĐT)</label><input class="f-group" style="margin-bottom:0;" id="dPhone" type="tel" value="${b.phone || ''}" oninput="this.value = this.value.replace(/[^0-9+]/g, '')"></div>
                    </div>
                    
                    <div class="flex-row" style="margin-bottom: 15px;">
                        <div class="flex-col">
                            <label style="font-size: 12px; font-weight: bold; margin-bottom: 6px; display: block;">Ngày đến</label>
                            <div class="date-wrapper">
                                <span class="date-label" id="lblDetStart">${fmt(dStartInput)}</span>
                                <input id="dStart" type="date" value="${dStartInput}" onchange="document.getElementById('lblDetStart').innerText = fmt(this.value)">
                            </div>
                        </div>
                        <div class="flex-col">
                            <label style="font-size: 12px; font-weight: bold; margin-bottom: 6px; display: block;">Ngày đi</label>
                            <div class="date-wrapper">
                                <span class="date-label" id="lblDetEnd">${fmt(dEndInput)}</span>
                                <input id="dEnd" type="date" value="${dEndInput}" onchange="document.getElementById('lblDetEnd').innerText = fmt(this.value)">
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex-row">
                        <div class="flex-col"><label style="font-size: 12px; font-weight: bold; margin-bottom: 6px; display: block;">Giá / Đêm</label><input class="f-group" style="margin-bottom:0;" id="dPrice" type="number" value="${appliedPrice}"></div>
                        <div class="flex-col"><label style="font-size: 12px; font-weight: bold; margin-bottom: 6px; display: block;">Tiền cọc</label><input class="f-group" style="margin-bottom:0;" id="dDeposit" type="number" value="${deposit}"></div>
                    </div>
                    <button class="btn btn-p" style="width:100%; padding: 12px; font-size: 14px; margin-top:15px;" onclick="saveBookingChanges('${bid}')">💾 LƯU THÔNG TIN / ĐỔI PHÒNG</button>
                </div>
                
                ${miniHtml}

                <div class="bill-box">
                    ${b.type === 'red' ? `<div class="bill-row" style="color:var(--p-blue); font-size:13px; font-weight:bold; margin-bottom: 12px; border-bottom: 1px dashed #ccc; padding-bottom: 8px;"><span>⏱ Giờ vào (thực tế):</span><span>${fmt(bStart, true)}</span></div>` : ''}
                    <div class="bill-row"><span>Đơn giá (${nights} đêm):</span><span>${appliedPrice.toLocaleString()}đ / đêm</span></div>
                    <div class="bill-row"><span>Tiền phòng:</span><span>${roomCost.toLocaleString()}đ</span></div>
                    ${miniTotal > 0 ? `<div class="bill-row" style="color:var(--s-purple);"><span>Phụ thu Dịch vụ:</span><span>+ ${miniTotal.toLocaleString()}đ</span></div>` : ''}
                    <div class="bill-row" style="color: var(--s-green);"><span>Đã đặt cọc:</span><span>- ${deposit.toLocaleString()}đ</span></div>
                    <div class="bill-row total"><span>CÒN LẠI CẦN THU:</span><span>${remaining.toLocaleString()}đ</span></div>
                </div>
                <div class="btn-row">${actionButtons}</div>
            `;
        }
        document.getElementById('pmsModal').style.display = 'flex';
    }

    // --- CÁC HÀM XỬ LÝ MINIBAR THÊM/XÓA ---
    window.addMbToBooking = async function(bid) {
        const b = bookings.find(x => x.id === bid);
        const itemVal = document.getElementById('mbItem').value;
        const qty = parseInt(document.getElementById('mbQty').value) || 1;
        
        if(!itemVal || qty < 1) return;
        
        const [name, priceStr] = itemVal.split('|');
        const price = parseInt(priceStr);
        
        let miniItems = [];
        try { miniItems = typeof b.minibar_items === 'string' ? JSON.parse(b.minibar_items) : (b.minibar_items || []); } catch(e) { miniItems = []; }
        miniItems.push({ name, price, qty });
        const newTotal = (parseInt(b.minibar_total) || 0) + (price * qty);
        
        const { error } = await _supabase.from('bookings').update({ 
            minibar_total: newTotal,
            minibar_items: JSON.stringify(miniItems)
        }).eq('id', bid);

        if(error) {
            alert("Lưu thất bại! Bạn đã tạo bảng 'services' trên Supabase chưa?");
            return;
        }
        await loadData();
        openDetail(bid); 
    }

    window.removeMb = async function(bid, idx) {
        const b = bookings.find(x => x.id === bid);
        let miniItems = typeof b.minibar_items === 'string' ? JSON.parse(b.minibar_items) : (b.minibar_items || []);
        
        if(idx < 0 || idx >= miniItems.length) return;
        
        const removed = miniItems.splice(idx, 1)[0];
        const newTotal = Math.max((parseInt(b.minibar_total) || 0) - (removed.price * removed.qty), 0);
        
        const { error } = await _supabase.from('bookings').update({ 
            minibar_total: newTotal,
            minibar_items: JSON.stringify(miniItems)
        }).eq('id', bid);
        
        if(!error) {
            await loadData();
            openDetail(bid);
        }
    }

    // --- LƯU THAY ĐỔI & LOGIC ĐỔI PHÒNG (BẾ TOÀN BỘ KHÁCH) ---
    async function saveBookingChanges(bid) {
        const b = bookings.find(x => x.id === bid);
        const newRoomId = document.getElementById('dRoomId').value; 
        const newName = document.getElementById('dName').value;
        const newPhone = document.getElementById('dPhone').value.trim();
        const newStartD = document.getElementById('dStart').value;
        const newEndD = document.getElementById('dEnd').value;
        const newPrice = parseInt(document.getElementById('dPrice').value) || 0;
        const newDeposit = parseInt(document.getElementById('dDeposit').value) || 0;

        if(!newName || newStartD >= newEndD) return alert("Vui lòng kiểm tra lại thông tin ngày tháng!");

        const oldStartTime = (b.start && b.start.includes('T')) ? b.start.substring(11, 16) : '14:00';
        const oldEndTime = (b.end && b.end.includes('T')) ? b.end.substring(11, 16) : '12:00';

        const newStart = `${newStartD}T${oldStartTime}`;
        const newEnd = `${newEndD}T${oldEndTime}`;

        // Kiểm tra xem phòng dự kiến Đổi/Gia hạn có đang bị kẹt lịch bởi khách nào khác không
        const overlap = bookings.some(x => x.id !== bid && x.roomId === newRoomId && (newStart < x.end && newEnd > x.start));
        if(overlap) return alert(`Lỗi: Không thể thực hiện vì Phòng ${newRoomId} đã có khách đặt trong khoảng thời gian này!`);

        // Update dữ liệu thẳng thừng (Nếu là đổi phòng, giá tiền mới đã được tự động thay bằng giá phòng mới)
        await _supabase.from('bookings').update({ 
            roomId: newRoomId, 
            guest: newName, phone: newPhone, start: newStart, 
            end: newEnd, price: newPrice, deposit: newDeposit 
        }).eq('id', bid);

        // NẾU LÀ ĐỔI PHÒNG: Đánh dấu phòng cũ là "Chờ dọn dẹp" nếu khách đã check-in
        if (b.roomId !== newRoomId && b.type === 'red') {
            await _supabase.from('rooms').update({ status: 'dirty' }).eq('id', b.roomId);
        }

        await loadData();
        closeModal(); 
    }

    async function checkOut(bid) {
        if(confirm("Xác nhận khách đã thanh toán đủ và trả phòng?")) {
            const b = bookings.find(x => x.id === bid);
            const oldDate = b.end ? b.end.substring(0, 10) : realTodayStr;
            const actualOut = `${oldDate}T${getCurrentTimeStr()}`; 
            
            await _supabase.from('bookings').update({ type: 'grey', end: actualOut }).eq('id', bid);
            await _supabase.from('rooms').update({ status: 'dirty' }).eq('id', b.roomId);
            closeModal(); 
            await loadData();
        }
    }

    async function updateBK(bid, type) { 
        let updateData = { type: type };
        
        if (type === 'red') {
            const b = bookings.find(x => x.id === bid);
            const oldDate = b.start ? b.start.substring(0, 10) : realTodayStr;
            updateData.start = `${oldDate}T${getCurrentTimeStr()}`;
        }
        
        await _supabase.from('bookings').update(updateData).eq('id', bid);
        closeModal(); 
        await loadData(); 
    }

    async function delBK(bid) { 
        if(confirm("Bạn có chắc chắn muốn xóa dữ liệu này?")) { 
            await _supabase.from('bookings').delete().eq('id', bid);
            closeModal(); 
            await loadData(); 
        } 
    }

    async function addRoom() {
        const id = prompt("Nhập Số/Tên phòng mới (VD: 301, P201):");
        const price = prompt("Giá mặc định mỗi đêm (VNĐ):", "350000");
        if(id && price) { 
            await _supabase.from('rooms').insert([{ id, price: parseInt(price), cat: "", status: "clean", lockbox: "", notes: "" }]);
            await loadData(); 
        }
    }

    // Xuất File CSV (Đã cập nhật Minibar)
    function exportCSV() {
        if(bookings.length === 0) return alert("Chưa có dữ liệu đặt phòng để xuất!");
        let csvContent = "data:text/csv;charset=utf-8,\uFEFFMa Dat Phong,Ten Khach,SDT,Phong,Ngay Den,Ngay Di,So Dem,Gia/Dem,Minibar,Tien Coc,Tong Tien,Trang Thai\r\n";
        bookings.forEach(b => {
            const r = rooms.find(rm => rm.id === b.roomId);
            
            const startCal = new Date((b.start ? b.start.substring(0, 10) : realTodayStr) + 'T00:00:00');
            const endCal = new Date((b.end ? b.end.substring(0, 10) : realTodayStr) + 'T00:00:00');
            const nights = Math.max((endCal - startCal) / 86400000, 1);
            
            const appliedPrice = b.price !== undefined ? b.price : (r ? r.price : 0);
            const miniTotal = parseInt(b.minibar_total) || 0;
            const total = (nights * appliedPrice) + miniTotal;
            const deposit = b.deposit || 0;
            
            let statusVN = "Lỗi";
            if(b.type === 'blue') statusVN = "Chưa cọc"; if(b.type === 'purple') statusVN = "Đã cọc";
            if(b.type === 'red') statusVN = "Đang ở"; if(b.type === 'grey') statusVN = "Đã trả phòng";
            
            csvContent += [b.id, b.guest.replace(/,/g, " "), b.phone || "", b.roomId, fmt(b.start, true), fmt(b.end, true), nights, appliedPrice, miniTotal, deposit, total, statusVN].join(",") + "\r\n";
        });
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", "Bao_Cao_Doanh_Thu_PMS.csv");
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function closeModal() { document.getElementById('pmsModal').style.display = 'none'; }
    
    // Gọi hàm load dữ liệu ngay khi mở app
    loadData();
</script>
</body>
</html>
