<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PMS ENTERPRISE - Hotel Management System</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="icon" type="image/png" href="logo.PNG">
    <link rel="apple-touch-icon" href="logo.PNG">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>

    <header>
        <div class="brand" style="display: flex; align-items: center; gap: 8px;">
            <img src="logo.png" alt="Logo" style="width: 36px; height: 36px; border-radius: 8px; object-fit: contain;">
            ULTIMATE PMS
        </div>
        <div class="stats-bar" id="topStats"></div>
        <div class="header-tools">
            <div class="month-nav">
                <button onclick="changeMonth(-1)">◀</button>
                <span class="month-label" id="monthLabel"></span>
                <input type="month" id="monthPicker" onchange="selectMonth()">
                <button onclick="changeMonth(1)">▶</button>
            </div>

            <select id="roomFilter" class="btn" style="background:#f4f7f6; color:#333; padding: 10px; border: 1px solid var(--border);" onchange="applyFilter()">
                <option value="all">Hiển thị: Tất cả</option>
                <option value="clean">Phòng sạch</option>
                <option value="dirty">Phòng chờ dọn</option>
            </select>
            
            <button class="btn" style="background:var(--s-purple); color:white; padding: 10px 15px; font-size: 13px;" onclick="openSearchModal()">🔍 TÌM PHÒNG</button>
            <button class="btn btn-s" style="padding: 10px 15px; font-size: 13px;" onclick="openMinibarCatalog()">📦 DỊCH VỤ</button>
            <button class="btn btn-s" style="background: #27ae60; padding: 10px 15px; font-size: 13px;" onclick="exportExcel()">📥 XUẤT EXCEL</button>
            <button class="btn btn-p" style="padding: 10px 15px; font-size: 13px;" onclick="addRoom()">+ PHÒNG</button>
        </div>
    </header>

    <div class="pms-wrapper">
        <main class="timeline-view" id="mainTimeline"></main>
    </div>

    <div class="modal" id="pmsModal">
        <div class="modal-box">
            <div class="modal-header">
                <span id="mTitle">Thông tin phòng</span>
                <span onclick="closeModal()" style="cursor:pointer; font-size: 18px;">✕</span>
            </div>
            <div class="modal-content" id="mContent"></div>
        </div>
    </div>

    <script src="app.js?v=1.2"></script>

</body>
</html>
