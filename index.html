<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Ultimate PMS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00459e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PMS App">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <div class="brand">ULTIMATE PMS</div>
    <div class="stats-bar" id="topStats"></div>
    <div class="header-tools">
        
        <div class="month-nav">
            <button onclick="changeMonth(-1)">◀</button>
            <span class="month-label" id="monthLabel"></span>
            <input type="month" id="monthPicker" onchange="selectMonth()">
            <button onclick="changeMonth(1)">▶</button>
        </div>

        <select id="roomFilter" class="btn" style="background:#f4f7f6; color:#333; padding: 10px; border: 1px solid var(--border);" onchange="applyFilter()">
            <option value="all">Hiển thị: Tất cả</option>
            <option value="clean">Phòng sạch</option>
            <option value="dirty">Phòng chờ dọn</option>
        </select>
        
        <button class="btn" style="background:var(--s-purple); color:white; padding: 10px 15px; font-size: 13px;" onclick="openSearchModal()">🔍 TÌM PHÒNG</button>
        <button class="btn btn-s" style="padding: 10px 15px; font-size: 13px;" onclick="openMinibarCatalog()">📦 DỊCH VỤ</button>
        <button class="btn btn-s" style="background: #27ae60; padding: 10px 15px; font-size: 13px;" onclick="exportExcel()">📥 XUẤT EXCEL</button>
        <button class="btn btn-p" style="padding: 10px 15px; font-size: 13px;" onclick="addRoom()">+ PHÒNG</button>
    </div>
</header>

<div class="pms-wrapper">
    <aside class="rooms-aside" id="sidebarRooms"></aside>
    <main class="timeline-view" id="mainTimeline">
        <div class="grid-header" id="dateHeader"></div>
        <div class="grid-body" id="gridCanvas"></div>
    </main>
</div>

<div class="modal" id="pmsModal">
    <div class="modal-box">
        <div class="modal-header">
            <span id="mTitle">Thông tin phòng</span>
            <span onclick="closeModal()" style="cursor:pointer; font-size: 18px;">✕</span>
        </div>
        <div class="modal-content" id="mContent"></div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('Đã đăng ký Service Worker thành công!', reg.scope);
            }).catch(err => {
                console.log('Đăng ký Service Worker thất bại:', err);
            });
        });
    }
</script>

<script src="script.js"></script>

</body>
</html>
