<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PMS ENTERPRISE - Hotel Management System</title>
    <style>
        :root {
            --p-blue: #00459e; --p-gold: #feba02; --p-red: #d4111e;
            --s-green: #008009; --s-purple: #8e44ad; --bg: #f4f7f6;
            --sidebar-w: 120px; --row-h: 105px; /* Tăng chiều cao để chứa Lockbox và Ghi chú */
            --cell-w: 100px;
            --border: #e0e0e0; --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; font-family: 'Inter', -apple-system, sans-serif; }
        
        /* Tối ưu hóa triệt để Viewport cho iOS / Android */
        body { 
            margin: 0; background: var(--bg); overflow: hidden; 
            height: 100vh; height: 100dvh; display: flex; flex-direction: column; 
            -webkit-text-size-adjust: 100%;
        }

        /* --- HEADER & DASHBOARD --- */
        header {
            background: #fff; height: 75px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; border-bottom: 2px solid var(--p-blue); z-index: 1000; box-shadow: var(--shadow);
            flex-shrink: 0; 
        }
        .brand { font-size: 22px; font-weight: 900; color: var(--p-blue); letter-spacing: -1px; white-space: nowrap; }
        .stats-bar { display: flex; gap: 15px; }
        .stat-card { background: var(--bg); padding: 8px 12px; border-radius: 10px; border-left: 4px solid var(--p-blue); }
        .stat-card small { display: block; font-size: 10px; color: #666; font-weight: bold; }
        .stat-card b { font-size: 16px; color: var(--p-blue); }
        
        .header-tools { display: flex; gap: 8px; align-items: center; overflow-x: auto; white-space: nowrap; padding: 5px 0; scrollbar-width: none; }
        .header-tools::-webkit-scrollbar { display: none; }

        .month-nav { display: flex; align-items: center; gap: 2px; background: var(--bg); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
        .month-nav button { background: none; border: none; font-size: 16px; cursor: pointer; padding: 5px 8px; color: var(--p-blue); font-weight: bold; }
        .month-nav button:hover { background: #e0e0e0; border-radius: 5px; }
        .month-nav input[type="month"] { border: none; background: transparent; font-weight: bold; color: #333; outline: none; font-size: 14px; cursor: pointer; width: 115px; }

        /* --- LAYOUT GRID --- */
        .pms-wrapper { display: grid; grid-template-columns: var(--sidebar-w) 1fr; flex: 1; overflow: hidden; }

        /* Sidebar Phòng */
        .rooms-aside { background: #fff; border-right: 1px solid var(--border); overflow-y: auto; scroll-behavior: smooth; }
        .room-head { height: 50px; background: #fafafa; border-bottom: 1px solid var(--border); position: sticky; top:0; z-index: 10; }
        
        .room-item {
            height: var(--row-h); border-bottom: 1px solid #eee; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative; cursor: pointer; transition: 0.3s;
            padding: 5px;
        }
        .room-item:hover { background: #f0f7ff; }
        .room-item b { font-size: 18px; line-height: 1.1; }
        .room-item .lb-code { color: var(--s-purple); font-weight: 900; font-size: 13px; margin: 3px 0; background: #f4e8f9; padding: 2px 6px; border-radius: 4px;}
        .room-item .r-price { font-size: 11px; font-weight: bold; color: #333; }
        .room-item .r-notes { font-size: 9px; color: #666; text-align: center; margin-top: 2px; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        /* Đèn báo trạng thái giờ được làm to hơn chút để dễ bấm */
        .badge-status { 
            width: 14px; height: 14px; border-radius: 50%; position: absolute; top: 8px; right: 8px; 
            box-shadow: 0 0 4px rgba(0,0,0,0.3); border: 2px solid #fff; cursor: pointer; transition: 0.2s;
        }
        .badge-status:hover { transform: scale(1.3); }

        /* Timeline & Grid */
        .timeline-view { overflow: auto; background: white; position: relative; }
        .grid-header { display: flex; height: 50px; position: sticky; top: 0; z-index: 50; background: #fff; border-bottom: 1px solid var(--border); }
        .date-unit {
            min-width: var(--cell-w); border-right: 1px solid #eee; flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px;
        }
        .date-unit.today { background: #fff9db; border-bottom: 3px solid var(--p-gold); }

        .grid-body { display: inline-block; min-width: 100%; }
        .grid-row { display: flex; height: var(--row-h); }
        .grid-cell { 
            min-width: var(--cell-w); border-right: 1px solid #f8f8f8; border-bottom: 1px solid #f8f8f8;
            position: relative; flex-shrink: 0; transition: 0.2s;
        }
        .grid-cell:hover { background: #fdfdfd; }

        /* Booking Bars */
        .booking-tag {
            position: absolute; height: 80%; top: 10%; border-radius: 8px; z-index: 5;
            color: white; padding: 8px; font-size: 11px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; transition: transform 0.2s;
        }
        .booking-tag:active { transform: scale(0.95); }
        .tag-blue { background: linear-gradient(135deg, #0071c2, #00459e); }
        .tag-purple { background: linear-gradient(135deg, #a332c3, #6c5ce7); }
        .tag-red { background: linear-gradient(135deg, #d4111e, #b20a15); }
        .tag-grey { background: linear-gradient(135deg, #7f8c8d, #95a5a6); opacity: 0.85; }

        /* --- MODAL SYSTEM --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-box {
            background: #fff; width: 95%; max-width: 480px; border-radius: 20px;
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.3); max-height: 85vh; overflow-y: auto;
        }
        .modal-header { background: var(--p-blue); color: #fff; padding: 18px; font-weight: bold; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 10;}
        .modal-content { padding: 20px 25px; }

        .f-group { margin-bottom: 15px; }
        .f-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 6px; color: #555; }
        
        .f-group input, .f-group select {
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px !important; outline: none; transition: 0.3s; background: #fff;
        }
        .f-group input:focus, .f-group select:focus { border-color: var(--p-blue); }

        /* Bill Table */
        .bill-box { background: #fdfaf0; border: 1px solid #fcebb6; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .bill-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #444; }
        .bill-row.total { border-top: 1px dashed #ccc; padding-top: 8px; font-weight: bold; font-size: 16px; color: var(--p-red); margin-bottom: 0;}

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 14px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 14px; white-space: nowrap;}
        .btn-p { background: var(--p-blue); color: #fff; }
        .btn-s { background: var(--s-green); color: #fff; }
        .btn-d { background: var(--p-red); color: #fff; }
        .btn-cancel { background: #eee; color: #333; grid-column: span 2; }

        @media (max-width: 1024px) {
            .brand { display: none; } 
        }
        @media (max-width: 768px) {
            :root { --sidebar-w: 90px; --cell-w: 70px; --row-h: 110px; } /* Mở rộng xíu trên mobile để chữ ko bị ép */
            .stats-bar { display: none; }
            .header-tools { width: 100%; justify-content: flex-start; padding: 5px; }
            .header-tools .btn { padding: 10px !important; font-size: 12px !important; }
            #roomFilter { display: none; } 
            .month-nav input[type="month"] { width: 100px; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">ULTIMATE PMS</div>
    <div class="stats-bar" id="topStats"></div>
    <div class="header-tools">
        
        <div class="month-nav">
            <button onclick="changeMonth(-1)">◀</button>
            <input type="month" id="monthPicker" onchange="selectMonth()">
            <button onclick="changeMonth(1)">▶</button>
        </div>

        <select id="roomFilter" class="btn" style="background:#f4f7f6; color:#333; padding: 10px; border: 1px solid var(--border);" onchange="applyFilter()">
            <option value="all">Hiển thị: Tất cả</option>
            <option value="clean">Phòng sạch</option>
            <option value="dirty">Phòng chờ dọn</option>
        </select>
        
        <button class="btn" style="background:var(--s-purple); color:white; padding: 10px 15px; font-size: 13px;" onclick="openSearchModal()">🔍 TÌM PHÒNG</button>
        <button class="btn btn-s" style="padding: 10px 15px; font-size: 13px;" onclick="exportCSV()">📥 CSV</button>
        <button class="btn btn-p" style="padding: 10px 15px; font-size: 13px;" onclick="addRoom()">+ PHÒNG</button>
    </div>
</header>

<div class="pms-wrapper">
    <aside class="rooms-aside" id="sidebarRooms"></aside>
    <main class="timeline-view" id="mainTimeline">
        <div class="grid-header" id="dateHeader"></div>
        <div class="grid-body" id="gridCanvas"></div>
    </main>
</div>

<div class="modal" id="pmsModal">
    <div class="modal-box">
        <div class="modal-header">
            <span id="mTitle">Thông tin phòng</span>
            <span onclick="closeModal()" style="cursor:pointer; font-size: 18px;">✕</span>
        </div>
        <div class="modal-content" id="mContent"></div>
    </div>
</div>

<script>
    // --- HÀM HỖ TRỢ NGÀY GIỜ CHUẨN ---
    function getLocalISODate(d) {
        const offset = d.getTimezoneOffset() * 60000;
        return new Date(d.getTime() - offset).toISOString().split('T')[0];
    }

    // --- DATA ENGINE ---
    // Cập nhật dữ liệu mẫu để có trường lockbox và notes
    let rooms = JSON.parse(localStorage.getItem('pms_rooms')) || [
        { id: "301 (P4)", price: 710000, cat: "Phòng Lớn", status: "clean", lockbox: "9138", notes: "" },
        { id: "P201 (P1)", price: 350000, cat: "Phòng Đơn", status: "clean", lockbox: "6138", notes: "Ban công, ánh sáng tốt" },
        { id: "P102 (P2)", price: 350000, cat: "Phòng Đôi", status: "dirty", lockbox: "3168", notes: "Cửa sổ, view đường phố" }
    ];
    let bookings = JSON.parse(localStorage.getItem('pms_bookings')) || [];
    
    let currentFilter = 'all';
    let searchCriteria = null; 

    const realTodayStr = getLocalISODate(new Date()); 
    let currentViewDate = new Date();
    currentViewDate.setHours(12, 0, 0, 0); 

    function save() {
        localStorage.setItem('pms_rooms', JSON.stringify(rooms));
        localStorage.setItem('pms_bookings', JSON.stringify(bookings));
        render();
    }

    // --- HÀM ĐIỀU HƯỚNG THÁNG ---
    function changeMonth(delta) {
        currentViewDate.setMonth(currentViewDate.getMonth() + delta);
        render();
    }

    function selectMonth() {
        const val = document.getElementById('monthPicker').value;
        if (val) {
            const parts = val.split('-');
            currentViewDate.setFullYear(parseInt(parts[0]));
            currentViewDate.setMonth(parseInt(parts[1]) - 1);
            render();
        }
    }

    // --- RENDERING ---
    function render() {
        renderSidebar();
        renderTimeline();
        renderDashboard();
    }

    function applyFilter() {
        currentFilter = document.getElementById('roomFilter').value;
        if (currentFilter !== 'search') {
            searchCriteria = null;
            let opt = document.getElementById('optSearch');
            if (opt) opt.style.display = 'none';
        }
        render();
    }

    function renderDashboard() {
        const active = bookings.filter(b => realTodayStr >= b.start && realTodayStr < b.end && b.type === 'red').length;
        
        const totalRev = bookings.reduce((sum, b) => {
            const days = (new Date(b.end) - new Date(b.start)) / 86400000;
            const appliedPrice = b.price !== undefined ? b.price : (rooms.find(rm => rm.id === b.roomId)?.price || 0);
            return sum + (days * appliedPrice);
        }, 0);

        document.getElementById('topStats').innerHTML = `
            <div class="stat-card"><small>ĐANG Ở</small><b>${active}</b></div>
            <div class="stat-card"><small>TỔNG DOANH THU</small><b>${(totalRev/1000).toLocaleString()}k</b></div>
        `;
    }

    function renderSidebar() {
        const sb = document.getElementById('sidebarRooms');
        sb.innerHTML = '<div class="room-head"></div>';
        
        const filteredRooms = rooms.filter(r => {
            if (currentFilter !== 'all' && currentFilter !== 'search' && r.status !== currentFilter) return false;
            if (currentFilter === 'search' && searchCriteria) {
                const isOverlapped = bookings.some(b => b.roomId === r.id && (searchCriteria.start < b.end && searchCriteria.end > b.start));
                if (isOverlapped) return false; 
            }
            return true;
        });

        filteredRooms.forEach(r => {
            const activeBooking = bookings.find(b => b.roomId === r.id && realTodayStr >= b.start && realTodayStr < b.end && b.type === 'red');
            let isDirty = r.status === 'dirty';
            
            let badgeColor = 'var(--s-green)'; 
            let sttText = 'Sạch - Sẵn sàng';
            
            if (activeBooking) {
                badgeColor = 'var(--p-red)'; 
                sttText = 'Đang có khách lưu trú';
            } else if (isDirty) {
                badgeColor = 'var(--p-gold)'; 
                sttText = 'Khách đã out - Chờ dọn dẹp';
            }

            // Giao diện Sidebar mới tích hợp Lockbox và Ghi chú. Khi bấm vào vùng ngoài đèn báo, sẽ mở Cài đặt phòng
            sb.innerHTML += `
                <div class="room-item" onclick="openRoomSettings('${r.id}')" title="Nhấn để mở Cài đặt phòng">
                    <b>${r.id}</b>
                    <span class="lb-code">${r.lockbox ? 'LB: ' + r.lockbox : 'Chưa có LB'}</span>
                    <span class="r-price">${(r.price/1000).toLocaleString()}k/đ</span>
                    <span class="r-notes">${r.notes || '---'}</span>
                    
                    <div class="badge-status" style="background:${badgeColor}" onclick="toggleDirty('${r.id}', event)" title="Tình trạng: ${sttText}. Nhấn để đổi trạng thái Dọn dẹp"></div>
                </div>`;
        });
    }

    function renderTimeline() {
        const header = document.getElementById('dateHeader');
        const canvas = document.getElementById('gridCanvas');
        header.innerHTML = ''; canvas.innerHTML = '';

        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        document.getElementById('monthPicker').value = `${year}-${String(month + 1).padStart(2, '0')}`;

        let dateArr = [];
        for(let i = 1; i <= daysInMonth; i++) { 
            let d = new Date(year, month, i, 12, 0, 0);
            const ds = getLocalISODate(d);
            dateArr.push(ds);
            
            const isToday = ds === realTodayStr ? 'today' : '';
            header.innerHTML += `
                <div class="date-unit ${isToday}">
                    <span>${d.toLocaleDateString('vi-VN', {weekday: 'short'})}</span>
                    <b>${d.getDate()}/${d.getMonth()+1}</b>
                </div>`;
        }

        const viewStartStr = dateArr[0];
        const viewEndStr = dateArr[dateArr.length - 1];

        const filteredRooms = rooms.filter(r => {
            if (currentFilter !== 'all' && currentFilter !== 'search' && r.status !== currentFilter) return false;
            if (currentFilter === 'search' && searchCriteria) {
                const isOverlapped = bookings.some(b => b.roomId === r.id && (searchCriteria.start < b.end && searchCriteria.end > b.start));
                if (isOverlapped) return false; 
            }
            return true;
        });

        filteredRooms.forEach(r => {
            const row = document.createElement('div');
            row.className = 'grid-row';
            
            dateArr.forEach(date => {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                
                const b = bookings.find(bk => bk.roomId === r.id && 
                    (bk.start === date || (date === viewStartStr && bk.start < viewStartStr && bk.end > viewStartStr))
                );

                if(b) {
                    let startRenderDate = new Date(date);
                    let endRenderDate = new Date(b.end);
                    let durationToRender = (endRenderDate - startRenderDate) / 86400000;
                    
                    const width = (durationToRender * (window.innerWidth <= 768 ? 70 : 100)) - 10;
                    const totalNights = Math.max((new Date(b.end) - new Date(b.start)) / 86400000, 1);
                    const label = b.type === 'grey' ? '(Đã xong)' : '';
                    const depositText = (b.deposit && b.deposit > 0) ? ` - Cọc: ${(b.deposit/1000)}k` : '';

                    const isCrossMonth = b.start < viewStartStr ? 'border-radius: 0 8px 8px 0; border-left: 3px dashed #fff;' : '';

                    cell.innerHTML = `
                        <div class="booking-tag tag-${b.type}" style="width: ${width}px; ${isCrossMonth}" onclick="openDetail('${b.id}')">
                            <div style="white-space:nowrap; overflow:hidden">${b.guest} ${label}</div>
                            <small>${totalNights} đêm${depositText}</small>
                        </div>`;
                } else {
                    cell.onclick = () => openBooking(r.id, date);
                }
                row.appendChild(cell);
            });
            canvas.appendChild(row);
        });
    }

    // --- TÍNH NĂNG TÌM PHÒNG TRỐNG THEO NGÀY ---
    function openSearchModal() {
        document.getElementById('mTitle').innerText = `Bộ lọc Tìm phòng trống`;
        let tmr = new Date(); tmr.setDate(tmr.getDate() + 1);
        const defaultOut = getLocalISODate(tmr);

        document.getElementById('mContent').innerHTML = `
            <div style="background:#f0f7ff; padding:15px; border-radius:12px; margin-bottom:15px; font-size:13px; color:#333;">
                Nhập khoảng thời gian khách muốn ở. Hệ thống sẽ lọc và chỉ hiển thị những phòng <b>chưa có ai đặt</b> trong thời gian này.
            </div>
            <div class="f-group"><label>Ngày khách muốn Check-in</label><input id="sStart" type="date" value="${realTodayStr}"></div>
            <div class="f-group"><label>Ngày khách Check-out</label><input id="sEnd" type="date" value="${defaultOut}"></div>
            <div class="btn-row" style="margin-top: 25px;">
                <button class="btn btn-p" onclick="executeSearch()">TÌM PHÒNG TRỐNG</button>
                <button class="btn btn-cancel" onclick="closeModal()">HỦY BỎ</button>
            </div>
        `;
        document.getElementById('pmsModal').style.display = 'flex';
    }

    function executeSearch() {
        const sStart = document.getElementById('sStart').value;
        const sEnd = document.getElementById('sEnd').value;
        if (!sStart || !sEnd || sStart >= sEnd) return alert("Ngày đi phải lớn hơn ngày đến!");

        searchCriteria = { start: sStart, end: sEnd };

        let opt = document.getElementById('optSearch');
        if (!opt) {
            opt = document.createElement('option');
            opt.id = 'optSearch';
            opt.value = 'search';
            document.getElementById('roomFilter').appendChild(opt);
        }
        opt.text = `Đang lọc: ${sStart.split('-').reverse().join('/')} ➔ ${sEnd.split('-').reverse().join('/')}`;
        opt.style.display = 'block';
        
        document.getElementById('roomFilter').value = 'search';
        currentFilter = 'search';

        closeModal(); render();
    }

    // --- TÍNH NĂNG QUẢN LÝ PHÒNG (ĐÃ BỔ SUNG LOCKBOX & GHI CHÚ) ---
    function openRoomSettings(rid) {
        const r = rooms.find(x => x.id === rid);
        document.getElementById('mTitle').innerText = `Cài đặt phòng`;
        document.getElementById('mContent').innerHTML = `
            <div class="f-group"><label>Tên / Số phòng</label><input id="fRoomId" type="text" value="${r.id}" placeholder="VD: 101, P201 (P1)"></div>
            <div style="display:flex; gap:10px;">
                <div class="f-group" style="flex:1;"><label>Mã Lockbox</label><input id="fRoomLockbox" type="text" value="${r.lockbox || ''}" placeholder="VD: 9138"></div>
                <div class="f-group" style="flex:1;"><label>Giá gốc / đêm</label><input id="fRoomPrice" type="number" value="${r.price}"></div>
            </div>
            <div class="f-group"><label>Ghi chú / Tính chất phòng</label><input id="fRoomNotes" type="text" value="${r.notes || ''}" placeholder="VD: Quạt trần, ban công, 2 giường..."></div>
            <div class="btn-row" style="margin-top: 25px;">
                <button class="btn btn-p" onclick="saveRoomSettings('${rid}')">LƯU THAY ĐỔI</button>
                <button class="btn btn-d" onclick="deleteRoom('${rid}')">XÓA PHÒNG</button>
                <button class="btn btn-cancel" onclick="closeModal()">HỦY BỎ</button>
            </div>
        `;
        document.getElementById('pmsModal').style.display = 'flex';
    }

    function saveRoomSettings(oldRid) {
        const newId = document.getElementById('fRoomId').value.trim();
        const newPrice = parseInt(document.getElementById('fRoomPrice').value) || 0;
        const newLockbox = document.getElementById('fRoomLockbox').value.trim();
        const newNotes = document.getElementById('fRoomNotes').value.trim();

        if(!newId) return alert("Tên phòng không được để trống!");
        if(newId !== oldRid && rooms.some(x => x.id === newId)) return alert("Tên phòng này đã tồn tại trong hệ thống! Vui lòng chọn tên khác.");

        const r = rooms.find(x => x.id === oldRid);
        r.id = newId; r.price = newPrice; r.lockbox = newLockbox; r.notes = newNotes;

        if(newId !== oldRid) {
            bookings.forEach(b => { if(b.roomId === oldRid) b.roomId = newId; });
        }
        closeModal(); save();
    }

    function deleteRoom(rid) {
        const hasBookings = bookings.some(b => b.roomId === rid);
        let msg = `Bạn có chắc chắn muốn xóa phòng ${rid} khỏi hệ thống không?`;
        if (hasBookings) msg = `CẢNH BÁO NGUY HIỂM:\Phòng ${rid} đang có lịch sử khách hàng!\nBạn vẫn muốn tiếp tục xóa?`;

        if(confirm(msg)) {
            rooms = rooms.filter(x => x.id !== rid);
            bookings = bookings.filter(x => x.roomId !== rid); 
            closeModal(); save();
        }
    }

    function toggleDirty(rid, event) {
        if(event) event.stopPropagation(); // Ngăn việc click vào đèn báo làm mở Form cài đặt phòng
        const r = rooms.find(x => x.id === rid);
        if(r.status === 'dirty') {
            if(confirm("Xác nhận phòng " + rid + " đã được dọn sạch?")) { r.status = 'clean'; save(); }
        } else {
            if(confirm("Đánh dấu phòng " + rid + " cần dọn dẹp?")) { r.status = 'dirty'; save(); }
        }
    }


    // --- CÁC CHỨC NĂNG NGHIỆP VỤ ĐẶT PHÒNG ---
    window.checkDepositStatus = function() {
        const dep = parseInt(document.getElementById('fDeposit').value) || 0;
        const typeSelect = document.getElementById('fType');
        if (dep > 0 && typeSelect.value === 'blue') typeSelect.value = 'purple'; 
        else if (dep === 0 && typeSelect.value === 'purple') typeSelect.value = 'blue'; 
    };

    function openBooking(roomId, date) {
        const r = rooms.find(x => x.id === roomId);
        let nextDay = new Date(date); nextDay.setDate(nextDay.getDate() + 1);
        const nextDayStr = getLocalISODate(nextDay);

        document.getElementById('mTitle').innerText = `Đặt phòng ${roomId}`;
        document.getElementById('mContent').innerHTML = `
            <div class="f-group"><label>Khách hàng & SĐT</label><input id="fName" type="text" placeholder="VD: Anh Minh - 090xxx"></div>
            <div style="display:flex; gap:10px">
                <div class="f-group" style="flex:1"><label>Từ ngày</label><input id="fStart" type="date" value="${date}"></div>
                <div class="f-group" style="flex:1"><label>Đến ngày</label><input id="fEnd" type="date" value="${nextDayStr}"></div>
            </div>
            <div style="display:flex; gap:10px">
                <div class="f-group" style="flex:1"><label>Giá thỏa thuận / Đêm</label><input id="fPrice" type="number" value="${r.price}"></div>
                <div class="f-group" style="flex:1"><label>Tiền đã cọc (VNĐ)</label><input id="fDeposit" type="number" value="0" oninput="checkDepositStatus()" placeholder="0"></div>
            </div>
            <div class="f-group">
                <label>Trạng thái đặt phòng</label>
                <select id="fType">
                    <option value="blue">Chưa cọc (Xanh)</option>
                    <option value="purple">Đã đặt cọc (Tím)</option>
                    <option value="red">Check-in luôn (Đỏ)</option>
                </select>
            </div>
            <button class="btn btn-p" style="width:100%; margin-top: 10px;" onclick="confirmBooking('${roomId}')">XÁC NHẬN ĐẶT PHÒNG</button>
        `;
        document.getElementById('pmsModal').style.display = 'flex';
    }

    function confirmBooking(roomId) {
        const guest = document.getElementById('fName').value;
        const start = document.getElementById('fStart').value;
        const end = document.getElementById('fEnd').value;
        const price = parseInt(document.getElementById('fPrice').value) || 0;
        const deposit = parseInt(document.getElementById('fDeposit').value) || 0;

        if(!guest || start >= end) return alert("Vui lòng kiểm tra lại thông tin ngày tháng hoặc tên khách!");

        const overlap = bookings.some(b => b.roomId === roomId && (start < b.end && end > b.start));
        if(overlap) return alert("Phòng này đã có khách lưu trú trong thời gian bạn chọn!");

        bookings.push({ id: 'BK'+Date.now(), roomId, guest, start, end, type: document.getElementById('fType').value, price: price, deposit: deposit });
        closeModal(); save();
    }

    function openDetail(bid) {
        const b = bookings.find(x => x.id === bid);
        const r = rooms.find(rm => rm.id === b.roomId);
        
        const nights = Math.max((new Date(b.end) - new Date(b.start)) / 86400000, 1);
        const appliedPrice = b.price !== undefined ? b.price : r.price;
        const deposit = b.deposit || 0;
        const totalCost = nights * appliedPrice;
        const remaining = totalCost - deposit;
        const isCompleted = b.type === 'grey';

        document.getElementById('mTitle').innerText = isCompleted ? "Lịch sử lưu trú" : "Quản lý lưu trú";
        
        let actionButtons = '';
        if (isCompleted) {
            actionButtons = `
                <button class="btn btn-d" style="grid-column: span 2" onclick="delBK('${bid}')">XÓA HẲN LỊCH SỬ NÀY</button>
                <button class="btn btn-cancel" onclick="closeModal()">ĐÓNG</button>
            `;
        } else {
            actionButtons = `
                ${b.type !== 'red' ? `<button class="btn btn-s" onclick="updateBK('${bid}','red')">CHECK-IN</button>` : ''}
                <button class="btn btn-p" style="background:var(--p-gold); color:#000" onclick="checkOut('${bid}')">CHECK-OUT & THU TIỀN</button>
                <button class="btn btn-d" onclick="delBK('${bid}')">HỦY PHÒNG</button>
                <button class="btn btn-cancel" onclick="closeModal()">ĐÓNG</button>
            `;
        }

        // Hiện mã lockbox trong chi tiết khách để dễ copy gửi
        const lbDisplay = r.lockbox ? `<b style="color:var(--s-purple); background:#f4e8f9; padding:2px 5px; border-radius:4px;">LB: ${r.lockbox}</b>` : '';

        document.getElementById('mContent').innerHTML = `
            <div style="background:#f0f7ff; padding:15px; border-radius:12px;">
                <h2 style="margin:0">${b.guest} ${isCompleted ? '<span style="color:#7f8c8d; font-size:14px">(Đã trả phòng)</span>' : ''}</h2>
                <p style="margin: 8px 0; color: #555;">Phòng: <b>${b.roomId}</b> ${lbDisplay} <br> Ngày: ${b.start.split('-').reverse().join('/')} ➔ ${b.end.split('-').reverse().join('/')}</p>
            </div>
            <div class="bill-box">
                <div class="bill-row"><span>Đơn giá (${nights} đêm):</span><span>${appliedPrice.toLocaleString()}đ / đêm</span></div>
                <div class="bill-row"><span>Thành tiền:</span><span>${totalCost.toLocaleString()}đ</span></div>
                <div class="bill-row" style="color: var(--s-green);"><span>Đã đặt cọc:</span><span>- ${deposit.toLocaleString()}đ</span></div>
                <div class="bill-row total"><span>CÒN LẠI CẦN THU:</span><span>${remaining.toLocaleString()}đ</span></div>
            </div>
            <div class="btn-row">${actionButtons}</div>
        `;
        document.getElementById('pmsModal').style.display = 'flex';
    }

    function checkOut(bid) {
        if(confirm("Xác nhận khách đã thanh toán đủ và trả phòng?")) {
            const b = bookings.find(x => x.id === bid);
            rooms.find(r => r.id === b.roomId).status = 'dirty';
            b.type = 'grey'; 
            closeModal(); save();
        }
    }

    function updateBK(bid, type) { bookings.find(x => x.id === bid).type = type; closeModal(); save(); }
    function delBK(bid) { if(confirm("Bạn có chắc chắn muốn xóa dữ liệu này?")) { bookings = bookings.filter(x => x.id !== bid); closeModal(); save(); } }

    function addRoom() {
        const id = prompt("Nhập Số/Tên phòng mới (VD: 301, P201):");
        const price = prompt("Giá mặc định mỗi đêm (VNĐ):", "350000");
        if(id && price) { rooms.push({ id, price: parseInt(price), cat: "", status: "clean", lockbox: "", notes: "" }); save(); }
    }

    function exportCSV() {
        if(bookings.length === 0) return alert("Chưa có dữ liệu đặt phòng để xuất!");
        let csvContent = "data:text/csv;charset=utf-8,\uFEFFMa Dat Phong,Ten Khach,Phong,Ngay Den,Ngay Di,So Dem,Gia/Dem,Tien Coc,Tong Tien,Trang Thai\r\n";
        bookings.forEach(b => {
            const r = rooms.find(rm => rm.id === b.roomId);
            const nights = Math.max((new Date(b.end) - new Date(b.start)) / 86400000, 1);
            const appliedPrice = b.price !== undefined ? b.price : (r ? r.price : 0);
            const total = nights * appliedPrice;
            const deposit = b.deposit || 0;
            let statusVN = "Lỗi";
            if(b.type === 'blue') statusVN = "Chưa cọc"; if(b.type === 'purple') statusVN = "Đã cọc";
            if(b.type === 'red') statusVN = "Đang ở"; if(b.type === 'grey') statusVN = "Đã trả phòng";
            csvContent += [b.id, b.guest.replace(/,/g, " "), b.roomId, b.start, b.end, nights, appliedPrice, deposit, total, statusVN].join(",") + "\r\n";
        });
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", "Bao_Cao_Doanh_Thu_PMS.csv");
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function closeModal() { document.getElementById('pmsModal').style.display = 'none'; }
    render();
</script>
</body>
</html>
