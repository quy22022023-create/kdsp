<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Booking Realtime Pro</title>
    <style>
        :root {
            --primary: #2d5a27; --bg: #f4f7f6;
            --red: #e74c3c;    /* Đang ở */
            --blue: #3498db;   /* Đã cọc đủ */
            --purple: #9b59b6; /* Cọc thiếu */
            --green: #2ecc71;  /* Trống */
            --gray: #e0e0e0;   /* Ô lịch trống */
        }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); overflow: hidden; color: #333; }

        header { 
            background: var(--primary); color: white; padding: 0 15px; 
            display: flex; justify-content: space-between; align-items: center; height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-add { background: white; color: var(--primary); border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; }

        .main-content { display: flex; height: calc(100vh - 60px); }

        /* Sidebar Phòng */
        .sidebar { width: 100px; flex-shrink: 0; background: white; border-right: 1px solid #ddd; overflow-y: auto; }
        .sidebar-item { 
            height: 80px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
        }
        .room-name { font-weight: bold; font-size: 15px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; box-shadow: 0 0 4px rgba(0,0,0,0.2); }

        /* Lịch cuộn */
        .calendar-view { flex-grow: 1; overflow-x: auto; background: white; display: flex; flex-direction: column; }
        .calendar-header { display: flex; height: 50px; background: #f8f9fa; border-bottom: 1px solid #ddd; position: sticky; top: 0; }
        .day-box { 
            min-width: 65px; border-right: 1px solid #eee; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0;
        }
        .day-box.today { background: #fff3cd; color: #856404; font-weight: bold; border-bottom: 3px solid #ffc107; }

        .grid-row { display: flex; height: 80px; border-bottom: 1px solid #eee; }
        .cell { min-width: 65px; border-right: 1px solid #f9f9f9; background: var(--gray); flex-shrink: 0; padding: 4px; display: flex; align-items: center; }
        
        /* Bar hiển thị khách */
        .booking-bar { 
            width: 100%; height: 90%; border-radius: 6px; color: white; 
            font-size: 10px; padding: 5px; display: flex; flex-direction: column; justify-content: center;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        /* Modal Form */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; 
        }
        .modal-box { background: white; width: 90%; max-width: 380px; border-radius: 15px; padding: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; margin-bottom: 4px; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { background: var(--primary); color: white; border: none; flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; }
        .btn-cancel { background: #eee; color: #333; border: none; flex: 1; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>

<header>
    <div><small>HÔM NAY</small><br><strong id="currentDisplayDate"></strong></div>
    <button class="btn-add" onclick="addNewRoom()">+ Thêm phòng</button>
</header>

<div class="main-content">
    <div class="sidebar" id="roomList"></div>
    <div class="calendar-view">
        <div class="calendar-header" id="dateHeader"></div>
        <div id="bookingGrid"></div>
    </div>
</div>

<div class="modal" id="bookingModal">
    <div class="modal-box">
        <h3 style="margin-top:0">Đặt phòng: <span id="targetRoom"></span></h3>
        <div class="form-group">
            <label>Tên khách hàng</label>
            <input type="text" id="guestName" placeholder="Nhập tên khách">
        </div>
        <div class="form-group">
            <label>Ngày đến (Check-in)</label>
            <input type="date" id="checkInDate">
        </div>
        <div class="form-group">
            <label>Ngày đi (Check-out)</label>
            <input type="date" id="checkOutDate">
        </div>
        <div class="form-group">
            <label>Trạng thái cọc / Ở</label>
            <select id="bookingType">
                <option value="red">Đã nhận phòng (Đỏ)</option>
                <option value="blue">Đã cọc đủ (Xanh dương)</option>
                <option value="purple">Cọc thiếu (Tím)</option>
            </select>
        </div>
        <div class="actions">
            <button class="btn-cancel" onclick="closeModal()">Đóng</button>
            <button class="btn-save" onclick="saveBooking()">Lưu đặt phòng</button>
        </div>
    </div>
</div>

<script>
    // 1. CẤU HÌNH DỮ LIỆU THỰC TẾ
    let rooms = ["P101", "P102", "P201", "P305", "VIP 1"];
    let bookings = [
        { room: "P102", start: "2026-03-29", end: "2026-03-31", name: "Hân Nguyễn", type: "red" },
        { room: "P201", start: "2026-04-02", end: "2026-04-05", name: "Anh Tú", type: "blue" }
    ];

    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];
    document.getElementById('currentDisplayDate').innerText = today.toLocaleDateString('vi-VN');

    function init() {
        renderSidebar();
        renderTimeline();
    }

    // 2. RENDER DANH SÁCH PHÒNG & DẤU CHẤM
    function renderSidebar() {
        const sidebar = document.getElementById('roomList');
        sidebar.innerHTML = '';
        rooms.forEach(r => {
            // Logic: Tìm xem hôm nay phòng có khách không để đổi màu dấu chấm
            const currentBooking = bookings.find(b => r === b.room && todayStr >= b.start && todayStr <= b.end);
            let dotColor = "var(--green)"; // Mặc định là trống
            if (currentBooking) dotColor = `var(--${currentBooking.type})`;

            sidebar.innerHTML += `
                <div class="sidebar-item" onclick="openForm('${r}')">
                    <div class="room-name">${r}</div>
                    <div class="status-dot" style="background: ${dotColor}"></div>
                </div>`;
        });
    }

    // 3. RENDER LỊCH THỜI GIAN THỰC
    function renderTimeline() {
        const header = document.getElementById('dateHeader');
        const grid = document.getElementById('bookingGrid');
        header.innerHTML = '';
        grid.innerHTML = '';

        // Hiển thị 30 ngày kể từ hôm nay
        let dateList = [];
        for (let i = -2; i < 28; i++) {
            let d = new Date();
            d.setDate(today.getDate() + i);
            dateList.push(d.toISOString().split('T')[0]);

            const isToday = d.toISOString().split('T')[0] === todayStr ? 'today' : '';
            const dayName = d.toLocaleDateString('vi-VN', { weekday: 'short' });
            header.innerHTML += `<div class="day-box ${isToday}">${dayName}<br>${d.getDate()}/${d.getMonth()+1}</div>`;
        }

        // Render từng hàng phòng
        rooms.forEach(r => {
            let rowHtml = `<div class="grid-row">`;
            dateList.forEach(date => {
                const b = bookings.find(bk => bk.room === r && date >= bk.start && date <= bk.end);
                if (b) {
                    const isStart = date === b.start;
                    rowHtml += `
                        <div class="cell" style="background: white; border-right: 1px solid #eee;">
                            <div class="booking-bar" style="background:var(--${b.type})">
                                ${isStart ? b.name : ''}
                            </div>
                        </div>`;
                } else {
                    rowHtml += `<div class="cell" onclick="openForm('${r}', '${date}')"></div>`;
                }
            });
            rowHtml += `</div>`;
            grid.innerHTML += rowHtml;
        });
    }

    // 4. LOGIC XỬ LÝ FORM
    let tempRoom = "";
    function openForm(room, date) {
        tempRoom = room;
        document.getElementById('targetRoom').innerText = room;
        document.getElementById('checkInDate').value = date || todayStr;
        document.getElementById('checkOutDate').value = date || todayStr;
        document.getElementById('bookingModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }

    function saveBooking() {
        const name = document.getElementById('guestName').value;
        const start = document.getElementById('checkInDate').value;
        const end = document.getElementById('checkOutDate').value;
        const type = document.getElementById('bookingType').value;

        if(!name || !start || !end) return alert("Vui lòng điền đủ thông tin!");
        if(start > end) return alert("Ngày đi không thể trước ngày đến!");

        bookings.push({ room: tempRoom, start, end, name, type });
        init();
        closeModal();
        document.getElementById('guestName').value = ""; // Reset form
    }

    function addNewRoom() {
        const name = prompt("Nhập tên phòng mới:");
        if (name) { rooms.push(name); init(); }
    }

    init();
</script>
</body>
</html>
