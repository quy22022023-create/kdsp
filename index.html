<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Booking Pro Logic</title>
    <style>
        :root {
            --primary: #2d5a27; --bg: #f8f9fa;
            --red: #e74c3c;    /* Đang ở */
            --blue: #3498db;   /* Đã cọc đủ */
            --purple: #9b59b6; /* Cọc thiếu */
            --yellow: #f1c40f; /* Chờ dọn */
            --green: #2ecc71;  /* Trống */
            --gray: #dfe6e9;   /* Ô trống trên lịch */
        }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); overflow: hidden; }

        /* Header */
        header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        .btn { background: white; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; color: var(--primary); }

        /* Layout */
        .container { display: flex; height: calc(100vh - 50px); }
        
        /* Cột phòng bên trái */
        .sidebar { width: 90px; flex-shrink: 0; background: white; border-right: 1px solid #ddd; z-index: 10; }
        .room-head { height: 40px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .room-row { height: 60px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .room-name { font-weight: bold; font-size: 14px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; }

        /* Lịch bên phải */
        .calendar { flex-grow: 1; overflow-x: auto; background: white; }
        .days-header { display: flex; height: 40px; background: #eee; position: sticky; top: 0; }
        .day-cell { min-width: 50px; border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; }
        .day-cell.today { background: #ffeaa7; font-weight: bold; }

        .grid-row { display: flex; height: 60px; border-bottom: 1px solid #eee; }
        .cell { min-width: 50px; border-right: 1px solid #f1f1f1; background: var(--gray); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* Thanh đặt phòng (Booking Bar) */
        .booking-bar { height: 70%; margin: 0 2px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; font-size: 9px; overflow: hidden; padding: 2px; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 350px; padding: 20px; border-radius: 10px; }
        input, select { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">BOOKING MANAGER</div>
    <button class="btn" onclick="addRoom()">+ Phòng</button>
</header>

<div class="container">
    <div class="sidebar" id="sidebar">
        <div class="room-head">PHÒNG</div>
    </div>
    <div class="calendar" id="calendar">
        <div class="days-header" id="daysHeader"></div>
        <div id="gridBody"></div>
    </div>
</div>

<div class="modal" id="bookingModal">
    <div class="modal-content">
        <h3 id="formTitle">Đặt phòng</h3>
        <label>Tên khách:</label>
        <input type="text" id="guestName" placeholder="Tên khách">
        <label>Từ ngày:</label>
        <input type="number" id="startDay" min="1" max="30">
        <label>Đến ngày:</label>
        <input type="number" id="endDay" min="1" max="30">
        <label>Tiền cọc:</label>
        <select id="depositStatus">
            <option value="blue">Đã cọc đủ (Xanh dương)</option>
            <option value="purple">Cọc thiếu (Tím)</option>
            <option value="red">Đã check-in (Đỏ)</option>
        </select>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn" style="background:#eee; flex:1" onclick="closeModal()">Hủy</button>
            <button class="btn" style="background:var(--primary); color:white; flex:1" onclick="saveBooking()">Lưu</button>
        </div>
    </div>
</div>

<script>
    // Dữ liệu giả lập
    let rooms = ["9138", "P102", "P201", "6168", "P305"];
    let bookings = [
        { room: "P102", start: 28, end: 30, name: "Hân Nguyễn", type: "red" },
        { room: "9138", start: 2, end: 4, name: "Anh Tú", type: "blue" }
    ];

    const today = new Date().getDate(); // Giả sử hôm nay là ngày 30

    function init() {
        renderSidebar();
        renderCalendarHeader();
        renderGrid();
    }

    function renderSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = '<div class="room-head">PHÒNG</div>';
        rooms.forEach(r => {
            // Logic tìm màu dấu chấm: Nếu có khách ở ngày "today" thì lấy màu đó, không thì màu Xanh lá
            const active = bookings.find(b => b.room === r && today >= b.start && today <= b.end);
            let dotColor = "var(--green)";
            if (active) dotColor = `var(--${active.type})`;

            sidebar.innerHTML += `
                <div class="room-row">
                    <div class="room-name">${r}</div>
                    <div class="status-dot" style="background: ${dotColor}"></div>
                </div>`;
        });
    }

    function renderCalendarHeader() {
        const head = document.getElementById('daysHeader');
        head.innerHTML = '';
        for (let i = 1; i <= 31; i++) {
            const isToday = i === today ? 'today' : '';
            head.innerHTML += `<div class="day-cell ${isToday}">T${(i%7)+2}<br>${i}/03</div>`;
        }
    }

    function renderGrid() {
        const body = document.getElementById('gridBody');
        body.innerHTML = '';
        rooms.forEach(r => {
            let row = `<div class="grid-row">`;
            for (let i = 1; i <= 31; i++) {
                const b = bookings.find(bk => bk.room === r && i >= bk.start && i <= bk.end);
                if (b) {
                    const isStart = i === b.start;
                    row += `<div class="cell" style="background:var(--${b.type}); border:none; color:white; font-size:9px;">
                                ${isStart ? b.name : ''}
                            </div>`;
                } else {
                    row += `<div class="cell" onclick="openForm('${r}', ${i})"></div>`;
                }
            }
            row += `</div>`;
            body.innerHTML += row;
        });
    }

    let currentRoom = '';
    function openForm(room, day) {
        currentRoom = room;
        document.getElementById('startDay').value = day;
        document.getElementById('endDay').value = day + 1;
        document.getElementById('bookingModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }

    function saveBooking() {
        const name = document.getElementById('guestName').value;
        const start = parseInt(document.getElementById('startDay').value);
        const end = parseInt(document.getElementById('endDay').value);
        const type = document.getElementById('depositStatus').value;

        if(!name) return alert("Nhập tên khách!");
        
        bookings.push({ room: currentRoom, start, end, name, type });
        init(); // Vẽ lại toàn bộ app
        closeModal();
    }

    function addRoom() {
        const n = prompt("Số phòng mới:");
        if(n) { rooms.push(n); init(); }
    }

    init();
</script>
</body>
</html>
