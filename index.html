<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kho Dao Bế - Supabase</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--blue:#007aff;--orange:#ff9500;--red:#ff3b30;--bg:#f2f2f7;}
body{font-family:-apple-system,Arial;background:var(--bg);margin:15px;color:#1c1c1e;}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:15px;}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #d1d1d6;box-sizing:border-box;font-size:16px;}
button{padding:12px;border:0;border-radius:10px;cursor:pointer;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:0.2s;}
.primary{background:var(--blue);color:#fff;width:100%;margin-top:15px;}
.warn{background:var(--orange);color:#fff;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;margin-top:15px;overflow:hidden;}
th,td{padding:12px;border-bottom:1px solid #eee;text-align:left;font-size:14px;}
th{background:#f8f8f8;color:#8e8e93;font-weight:600;}
.tag{background:#e5e5ea;padding:3px 6px;border-radius:5px;font-size:11px;margin-right:4px;display:inline-block;}
.qty{font-weight:bold;color:var(--red);font-size:16px;}
@media (max-width:768px){
    table,thead,tbody,th,td,tr{display:block;}
    thead{display:none;}
    tr{margin-bottom:10px;border:1px solid #eee;border-radius:10px;padding:10px;background:#fff;}
    td{border:none;padding:5px 0;}
    td::before{content:attr(data-label);font-weight:600;margin-right:10px;color:#8e8e93;}
}
</style>
</head>
<body>

<div class="card">
    <h3><i class="fa-solid fa-plus"></i> Nhập Kho Mới</h3>
    <input id="name" placeholder="Tên sản phẩm (VD: Dao Nhật)">
    
    <select id="category" onchange="updateFields()">
        <option value="">-- Chọn loại dao --</option>
        <option value="Dao Cắt">Dao Cắt</option>
        <option value="Dao Cấn">Dao Cấn</option>
        <option value="Dao Răng">Dao Răng</option>
    </select>

    <div id="dynamicFields"></div>

    <input id="qty" type="number" placeholder="Số lượng (Mét)">
    <button class="primary" id="btnSave" onclick="addProduct()"><i class="fa fa-save"></i> Lưu vào Supabase</button>
</div>

<table>
    <thead>
        <tr><th>Sản phẩm</th><th>Loại</th><th>Đặc tính</th><th>Tồn</th><th>Hành động</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
const URL = "https://awxkvzkigfxoidnvmxew.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3eGt2emtpZ2Z4b2lkbnZteGV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzUwNTcsImV4cCI6MjA4NTg1MTA1N30.eBGQc3rp9-H4ipsCDhUdLTC7aJB6HHDh6CKwsvV9b3A";
const sb = supabase.createClient(URL, KEY);

// 1. Tự động thay đổi ô nhập liệu dựa trên loại dao
function updateFields() {
    const cat = document.getElementById('category').value;
    const div = document.getElementById('dynamicFields');
    div.innerHTML = "";
    
    let fields = [];
    if(cat === "Dao Cắt") fields = ["Độ dày", "Chiều cao", "Kiểu lưỡi", "Chân dao (Có/Không)"];
    if(cat === "Dao Cấn") fields = ["Độ dày chân", "Độ dày đầu", "Chiều cao", "Kiểu đầu"];
    if(cat === "Dao Răng") fields = ["Độ dày", "Bước răng"];

    fields.forEach(f => {
        div.innerHTML += `<input class="attr-input" data-key="${f}" placeholder="${f}">`;
    });
}

// 2. Thêm sản phẩm
async function addProduct() {
    const btn = document.getElementById('btnSave');
    const name = document.getElementById('name').value;
    const cat = document.getElementById('category').value;
    const qty = parseFloat(document.getElementById('qty').value);

    if(!name || !cat) return alert("Thiếu thông tin!");
    btn.disabled = true;

    const dactinh = {};
    document.querySelectorAll('.attr-input').forEach(el => {
        if(el.value) dactinh[el.getAttribute('data-key')] = el.value;
    });

    const { error } = await sb.from('kho_dao').insert([{ 
        ten_dao: name, loai_dao: cat, dac_tinh: dactinh, so_luong: qty 
    }]);

    if(error) alert(error.message); else location.reload();
}

// 3. Xuất kho (Trừ số lượng)
async function xuat(id, cur) {
    const v = prompt("Số lượng xuất:");
    if(!v || isNaN(v)) return;
    const next = cur - parseFloat(v);
    if(next < 0) return alert("Không đủ kho!");
    await sb.from('kho_dao').update({ so_luong: next }).eq('id', id);
    render();
}

// 4. Hiển thị danh sách
async function render() {
    const { data } = await sb.from('kho_dao').select('*').order('ngay_tao', { ascending: false });
    const body = document.getElementById('tbody');
    body.innerHTML = "";
    data?.forEach(p => {
        let tags = "";
        for(let k in p.dac_tinh) tags += `<span class="tag">${k}: ${p.dac_tinh[k]}</span>`;
        
        body.innerHTML += `
            <tr>
                <td data-label="Sản phẩm"><b>${p.ten_dao}</b></td>
                <td data-label="Loại">${p.loai_dao}</td>
                <td data-label="Đặc tính">${tags}</td>
                <td data-label="Tồn" class="qty">${p.so_luong}</td>
                <td>
                    <button class="warn" onclick="xuat('${p.id}', ${p.so_luong})">- Xuất</button>
                </td>
            </tr>`;
    });
}
render();
</script>
</body>
</html>
