<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kho Dao - Supabase Sync</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<style>
:root{--blue:#1976d2;--orange:#ff9800;--red:#d32f2f;--bg:#f4f6f8;}
body{font-family:Segoe UI,Arial;background:var(--bg);margin:20px}
h1{margin-bottom:10px}
button{padding:8px 14px;border:0;border-radius:6px;cursor:pointer;display:inline-flex;gap:6px;align-items:center}
.primary{background:var(--blue);color:#fff}
.warn{background:var(--orange);color:#fff}
.small{padding:6px 10px;font-size:13px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden}
th,td{padding:9px;border-bottom:1px solid #eee;font-size:14px}
th{background:var(--blue);color:#fff}
.low{color:var(--red);font-weight:700}
.actions{display:flex;gap:5px}
.toolbar,.filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
input,select{padding:7px;border-radius:6px;border:1px solid #ccc}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:1000}
.box{background:#fff;padding:20px;border-radius:12px;width:420px}
ul{padding-left:18px}

@media (max-width:768px){
body{margin:10px}
h1{font-size:20px}
table,thead,tbody,th,td,tr{display:block}
thead{display:none}
tr{background:#fff;border-radius:10px;margin-bottom:10px;padding:10px}
td{border:none;padding:4px 0;font-size:13px}
td::before{content:attr(data-label);font-weight:600;color:#555;margin-right:10px}
.actions{flex-wrap:wrap}
.modal .box{width:95%;max-height:85vh;overflow:auto}
input,select{width:100%}
}
</style>
</head>

<body>

<h1><i class="fa-solid fa-warehouse"></i> Kho Dao (Cloud Sync)</h1>

<div class="toolbar">
<button class="primary" onclick="openPass()"><i class="fa fa-lock"></i> Đăng nhập</button>
<button class="primary" onclick="toggleForm()"><i class="fa fa-plus"></i> Thêm sản phẩm</button>
<button onclick="exportJSON()"><i class="fa fa-download"></i> Xuất JSON</button>
<select id="pdfMonth"></select>
<select id="pdfYear"></select>
<button class="warn" onclick="exportPDF()"><i class="fa fa-file-pdf"></i> PDF nhập/xuất</button>
<button class="warn" onclick="exportFullStockPDF()"><i class="fa fa-file-pdf"></i> PDF toàn kho</button>
</div>

<div class="filter">
<select id="f_category" onchange="render()"><option value="">Loại</option><option>dao cắt</option><option>dao răng</option><option>dao cấn</option></select>
<select id="f_size" onchange="render()"><option value="">Size</option><option>0.7</option><option>1.05</option><option>1.42</option></select>
<select id="f_origin" onchange="render()"><option value="">Xuất xứ</option><option>Nhật</option><option>Trung Quốc</option></select>
</div>

<div id="form" style="display:none;background:#fff;padding:15px;border-radius:12px;margin-bottom:10px">
<input id="name" placeholder="Tên sản phẩm">
<select id="category"><option>dao cắt</option><option>dao răng</option><option>dao cấn</option></select>
<select id="size"><option>0.7</option><option>1.05</option><option>1.42</option></select>
<select id="leg"><option>có chân</option><option>không chân</option></select>
<select id="blade"><option>lưỡi tròn</option><option>lưỡi bằng</option><option>lưỡi bầu</option><option>lưỡi nhọn</option></select>
<select id="origin"><option>Nhật</option><option>Trung Quốc</option></select>
<input id="qty" type="number" placeholder="Số lượng">
<button class="primary" onclick="addProduct()">Lưu lên Cloud</button>
</div>

<table>
<thead>
<tr><th>Tên</th><th>Loại</th><th>Size</th><th>Chân</th><th>Đầu</th><th>Xuất xứ</th><th>SL</th><th>Hành động</th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="modal" id="passModal"><div class="box"><input type="password" id="pass" placeholder="Mật khẩu"><button class="primary" onclick="login()">Xác nhận</button></div></div>
<div class="modal" id="ioModal"><div class="box"><h3 id="ioTitle"></h3><input id="ioQty" type="number" placeholder="Số lượng"><button class="warn" onclick="submitIO()">Xác nhận</button></div></div>
<div class="modal" id="editModal"><div class="box">
<input id="e_name"><select id="e_category"><option>dao cắt</option><option>dao răng</option><option>dao cấn</option></select>
<select id="e_size"><option>0.7</option><option>1.05</option><option>1.42</option></select>
<select id="e_leg"><option>có chân</option><option>không chân</option></select>
<select id="e_blade"><option>lưỡi tròn</option><option>lưỡi bằng</option><option>lưỡi bầu</option><option>lưỡi nhọn</option></select>
<select id="e_origin"><option>Nhật</option><option>Trung Quốc</option></select>
<input id="e_qty" type="number">
<div class="actions"><button class="primary" onclick="saveEdit()">Lưu</button><button class="warn" onclick="deleteProduct()">Xóa</button></div>
</div></div>
<div class="modal" id="historyModal"><div class="box"><h3>Lịch sử</h3><ul id="historyList"></ul><button class="warn small" onclick="historyModal.style.display='none'">Đóng</button></div></div>

<script>
// --- KẾT NỐI SUPABASE ---
const URL = "https://awxkvzkigfxoidnvmxew.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3eGt2emtpZ2Z4b2lkbnZteGV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzUwNTcsImV4cCI6MjA4NTg1MTA1N30.eBGQc3rp9-H4ipsCDhUdLTC7aJB6HHDh6CKwsvV9b3A";
const sb = supabase.createClient(URL, KEY);

const PASSWORD="kgget1234", LOW_STOCK=5;
let hasAccess=false, products=[], editId=null, ioId=null, ioType="";

// Khởi tạo PDF Month/Year
const now=new Date();
for(let m=0;m<12;m++) pdfMonth.innerHTML+=`<option value="${m}">${m+1}</option>`;
for(let y=now.getFullYear()-2;y<=now.getFullYear();y++) pdfYear.innerHTML+=`<option>${y}</option>`;
pdfMonth.value=now.getMonth(); pdfYear.value=now.getFullYear();

function openPass(){passModal.style.display="flex"}
function login(){if(pass.value===PASSWORD){hasAccess=true;passModal.style.display="none";alert("Đăng nhập thành công")}else alert("Sai mật khẩu")}
function toggleForm(){if(!hasAccess)return alert("Vui lòng đăng nhập");form.style.display=form.style.display?"":"block"}

// --- THAO TÁC DỮ LIỆU ---
async function render(){
    const { data } = await sb.from('products').select('*').order('name');
    products = data || [];
    tbody.innerHTML="";
    products.forEach((p) => {
        if(f_category.value && p.category !== f_category.value) return;
        if(f_size.value && p.size !== f_size.value) return;
        if(f_origin.value && p.origin !== f_origin.value) return;

        tbody.innerHTML+=`<tr>
            <td data-label="Tên">${p.name}</td><td data-label="Loại">${p.category}</td>
            <td data-label="Size">${p.size}</td><td data-label="Chân">${p.leg}</td>
            <td data-label="Đầu">${p.blade}</td><td data-label="Xuất xứ">${p.origin}</td>
            <td data-label="SL" class="${p.quantity<LOW_STOCK?'low':''}">${p.quantity}</td>
            <td class="actions">
                <button class="small primary" onclick="openIO('${p.id}','nhap')">+</button>
                <button class="small warn" onclick="openIO('${p.id}','xuat')">-</button>
                <button class="small" onclick="openEdit('${p.id}')">Sửa</button>
                <button class="small" onclick="viewHistory('${p.id}')">Sử</button>
            </td></tr>`;
    });
}

async function addProduct(){
    await sb.from('products').insert([{
        name:name.value, category:category.value, size:size.value,
        leg:leg.value, blade:blade.value, origin:origin.value,
        quantity:+qty.value, history:[]
    }]);
    form.style.display="none"; render();
}

function openIO(id, t){ if(!hasAccess)return; ioId=id; ioType=t; ioTitle.innerText=t==="nhap"?"Nhập kho":"Xuất kho"; ioModal.style.display="flex"; }

async function submitIO(){
    const p = products.find(x => x.id === ioId);
    const q = +ioQty.value;
    if(q<=0) return;
    const newQty = ioType==="nhap" ? p.quantity+q : p.quantity-q;
    if(newQty < 0) return alert("Không đủ hàng");
    
    const newHistory = [...p.history, {type:ioType, qty:q, date:new Date().toISOString()}];
    await sb.from('products').update({ quantity: newQty, history: newHistory }).eq('id', ioId);
    ioModal.style.display="none"; render();
}

function openEdit(id){
    if(!hasAccess)return; editId=id; const p=products.find(x=>x.id===id);
    e_name.value=p.name; e_category.value=p.category; e_size.value=p.size;
    e_leg.value=p.leg; e_blade.value=p.blade; e_origin.value=p.origin; e_qty.value=p.quantity;
    editModal.style.display="flex";
}

async function saveEdit(){
    await sb.from('products').update({
        name:e_name.value, category:e_category.value, size:e_size.value,
        leg:e_leg.value, blade:e_blade.value, origin:e_origin.value, quantity:+e_qty.value
    }).eq('id', editId);
    editModal.style.display="none"; render();
}

async function deleteProduct(){
    if(confirm("Xóa sản phẩm?")){ await sb.from('products').delete().eq('id', editId); editModal.style.display="none"; render(); }
}

function viewHistory(id){
    const p = products.find(x=>x.id===id);
    historyList.innerHTML = p.history.map(h => `<li>${h.type==='nhap'?'➕':'➖'} ${h.qty} | ${new Date(h.date).toLocaleString()}</li>`).join("");
    historyModal.style.display="flex";
}

// --- XUẤT FILE (GIỮ NGUYÊN LOGIC CỦA BẠN) ---
function removeVN(s){ return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/đ/g,"d").replace(/Đ/g,"D") }

function exportPDF(){
    const m=+pdfMonth.value, y=+pdfYear.value, rows=[];
    products.forEach(p=>p.history.forEach(h=>{
        const d=new Date(h.date);
        if(d.getMonth()===m && d.getFullYear()===y)
            rows.push([removeVN(p.name), h.type==="nhap"?"Nhap":"Xuat", h.qty, d.toLocaleString()]);
    }));
    const {jsPDF}=window.jspdf; const doc=new jsPDF();
    doc.text(`BAO CAO ${m+1}/${y}`,14,15);
    doc.autoTable({startY:22, head:[["Ten","Loai","SL","Time"]], body:rows});
    doc.save("bao_cao.pdf");
}

function exportFullStockPDF(){
    const rows=products.map(p=>[removeVN(p.name), removeVN(p.category), p.size, p.quantity]);
    const {jsPDF}=window.jspdf; const doc=new jsPDF();
    doc.autoTable({head:[["Ten","Loai","Size","SL"]], body:rows});
    doc.save("full_kho.pdf");
}

render();
</script>
</body>
</html>
