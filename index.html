<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Booking App Pro</title>
    <style>
        :root {
            --primary: #1a472a; --bg: #f2f2f7;
            --red: #ff3b30;    /* Đang ở */
            --blue: #007aff;   /* Đã cọc đủ */
            --purple: #af52de; /* Cọc thiếu */
            --green: #34c759;  /* Trống */
            --gray: #e5e5ea;   /* Ô trống */
            --border: #d1d1d6;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { margin: 0; background: var(--bg); color: #000; overflow: hidden; }

        /* Header */
        header { 
            background: var(--primary); color: white; padding: 0 15px; 
            display: flex; justify-content: space-between; align-items: center; height: 50px;
            position: sticky; top: 0; z-index: 1000;
        }
        .add-btn { background: #34c759; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; }

        /* Layout Grid */
        .app-grid { 
            display: grid; grid-template-columns: 85px 1fr; 
            height: calc(100vh - 50px); overflow: hidden; 
        }

        /* Cột Phòng (Sticky) */
        .room-sidebar { 
            background: #fff; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; z-index: 100;
        }
        .corner-box { height: 45px; background: #f2f2f7; border-bottom: 1px solid var(--border); }
        .room-item { 
            height: 65px; border-bottom: 1px solid #efeff4; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .room-name { font-weight: 700; font-size: 14px; color: #1c1c1e; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; }

        /* Vùng Lịch */
        .calendar-content { overflow: auto; background: #fff; position: relative; }
        .date-row { 
            display: flex; height: 45px; background: #f2f2f7; 
            position: sticky; top: 0; z-index: 90;
        }
        .date-cell { 
            min-width: 55px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px;
        }
        .date-cell.today { background: #fff9db; color: #ff9500; font-weight: bold; }

        .booking-rows { display: flex; flex-direction: column; }
        .grid-row { display: flex; height: 65px; }
        .cell { 
            min-width: 55px; border-right: 1px solid #efeff4; border-bottom: 1px solid #efeff4;
            display: flex; align-items: center; justify-content: center; position: relative;
        }

        /* Thanh Booking liền mạch */
        .bar { 
            width: 102%; height: 75%; color: white; font-size: 10px; font-weight: 500;
            display: flex; align-items: center; justify-content: center; padding: 0 4px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }
        .bar.start { border-top-left-radius: 4px; border-bottom-left-radius: 4px; margin-left: 2px; }
        .bar.end { border-top-right-radius: 4px; border-bottom-right-radius: 4px; margin-right: 2px; }

        /* Màu sắc */
        .bg-red { background-color: var(--red); }
        .bg-blue { background-color: var(--blue); }
        .bg-purple { background-color: var(--purple); }

        /* Modal */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; 
        }
        .modal-body { background: white; width: 85%; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-main { background: var(--primary); color: white; border: none; flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; }
        .btn-sub { background: #f2f2f7; color: #333; border: none; flex: 1; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 15px; font-weight: 700;">BOOKING PRO</div>
    <button class="add-btn" onclick="addNewRoom()">+ PHÒNG</button>
</header>

<div class="app-grid">
    <div class="room-sidebar" id="roomSidebar">
        <div class="corner-box"></div>
        </div>
    <div class="calendar-content">
        <div class="date-row" id="dateHeader"></div>
        <div class="booking-rows" id="gridRows"></div>
    </div>
</div>

<div class="modal" id="bookingModal">
    <div class="modal-body">
        <h3 id="modalTitle" style="margin-top:0; font-size: 18px;">Đặt phòng</h3>
        <input type="text" id="guestName" placeholder="Tên khách hàng">
        <input type="date" id="checkIn">
        <input type="date" id="checkOut">
        <select id="statusType">
            <option value="red">Đang ở (Màu Đỏ)</option>
            <option value="blue">Đã cọc đủ (Xanh dương)</option>
            <option value="purple">Cọc thiếu (Màu Tím)</option>
        </select>
        <div class="btn-group">
            <button class="btn-sub" onclick="closeModal()">Hủy</button>
            <button class="btn-main" onclick="saveData()">Lưu Lại</button>
        </div>
    </div>
</div>

<script>
    let rooms = ["P.101", "P.102", "P.103", "P.201", "P.202", "P.203", "VIP.1"];
    let bookings = [
        { room: "P.102", start: "2026-03-29", end: "2026-03-31", name: "Hân Nguyễn", type: "red" },
        { room: "P.201", start: "2026-04-01", end: "2026-04-03", name: "Anh Tú", type: "blue" }
    ];

    const today = new Date();
    const todayISO = today.toISOString().split('T')[0];

    function init() {
        renderRooms();
        renderCalendar();
    }

    function renderRooms() {
        const sidebar = document.getElementById('roomSidebar');
        sidebar.innerHTML = '<div class="corner-box"></div>';
        rooms.forEach(r => {
            const isBusy = bookings.find(b => b.room === r && todayISO >= b.start && todayISO <= b.end);
            let color = "var(--green)";
            if (isBusy) color = `var(--${isBusy.type})`;
            
            sidebar.innerHTML += `
                <div class="room-item">
                    <div class="room-name">${r}</div>
                    <div class="status-dot" style="background: ${color}"></div>
                </div>`;
        });
    }

    function renderCalendar() {
        const header = document.getElementById('dateHeader');
        const grid = document.getElementById('gridRows');
        header.innerHTML = ''; grid.innerHTML = '';

        let dates = [];
        for(let i = -2; i < 28; i++) {
            let d = new Date(); d.setDate(today.getDate() + i);
            dates.push(d.toISOString().split('T')[0]);
            const isToday = d.toISOString().split('T')[0] === todayISO ? 'today' : '';
            header.innerHTML += `<div class="date-cell ${isToday}">${d.toLocaleDateString('vi-VN',{weekday:'short'})}<br>${d.getDate()}/${d.getMonth()+1}</div>`;
        }

        rooms.forEach(r => {
            let row = `<div class="grid-row">`;
            dates.forEach(d => {
                const b = bookings.find(bk => bk.room === r && d >= bk.start && d <= bk.end);
                if (b) {
                    const isStart = d === b.start;
                    const isEnd = d === b.end;
                    row += `<div class="cell">
                        <div class="bar bg-${b.type} ${isStart?'start':''} ${isEnd?'end':''}">
                            ${isStart ? b.name : ''}
                        </div>
                    </div>`;
                } else {
                    row += `<div class="cell" onclick="openForm('${r}', '${d}')"></div>`;
                }
            });
            row += `</div>`;
            grid.innerHTML += row;
        });
    }

    let currentRoom = "";
    function openForm(room, date) {
        currentRoom = room;
        document.getElementById('modalTitle').innerText = "Đặt " + room;
        document.getElementById('checkIn').value = date;
        document.getElementById('checkOut').value = date;
        document.getElementById('bookingModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }

    function saveData() {
        const name = document.getElementById('guestName').value;
        const start = document.getElementById('checkIn').value;
        const end = document.getElementById('checkOut').value;
        const type = document.getElementById('statusType').value;

        if(!name) return alert("Vui lòng nhập tên!");
        bookings.push({ room: currentRoom, start, end, name, type });
        init(); closeModal();
        document.getElementById('guestName').value = "";
    }

    function addNewRoom() {
        const n = prompt("Tên phòng mới:");
        if(n) { rooms.push(n); init(); }
    }

    init();
</script>
</body>
</html>
