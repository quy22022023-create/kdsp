<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Manager Pro V3</title>
    <style>
        :root {
            --primary: #1a472a; --bg: #f2f2f7;
            --red: #ff3b30;    /* Đang ở */
            --blue: #007aff;   /* Đã cọc đủ */
            --purple: #af52de; /* Cọc thiếu */
            --yellow: #ffcc00; /* Chờ dọn dẹp */
            --green: #34c759;  /* Trống */
            --border: #d1d1d6;
        }

        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); overflow: hidden; }

        header { 
            background: var(--primary); color: white; padding: 0 15px; 
            display: flex; justify-content: space-between; align-items: center; height: 55px;
        }
        .add-btn { background: #34c759; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; }

        .app-grid { display: grid; grid-template-columns: 90px 1fr; height: calc(100vh - 55px); }

        /* Sidebar */
        .sidebar { background: #fff; border-right: 1px solid var(--border); overflow-y: auto; }
        .room-item { 
            height: 70px; border-bottom: 1px solid #eee; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .room-name { font-weight: bold; font-size: 14px; }
        .room-price { font-size: 10px; color: #666; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; }

        /* Lịch */
        .calendar { overflow: auto; background: #fff; }
        .date-row { display: flex; height: 45px; background: #f2f2f7; position: sticky; top: 0; z-index: 10; }
        .date-cell { 
            min-width: 60px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px;
        }
        .grid-row { display: flex; height: 70px; }
        .cell { min-width: 60px; border-right: 1px solid #f2f2f7; border-bottom: 1px solid #f2f2f7; position: relative; }

        /* Booking Bar */
        .bar { 
            width: 100%; height: 80%; margin-top: 5px; color: white; font-size: 10px;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .bg-red { background: var(--red); }
        .bg-blue { background: var(--blue); }
        .bg-purple { background: var(--purple); }
        .bg-yellow { background: var(--yellow); color: #000; }

        /* Form Modal */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; 
        }
        .modal-body { background: white; width: 90%; max-width: 360px; border-radius: 15px; padding: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .btn-out { background: var(--yellow); color: black; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div id="todayLabel" style="font-size: 14px; font-weight: bold;">LỊCH PHÒNG</div>
    <button class="add-btn" onclick="openRoomForm()">+ THÊM PHÒNG</button>
</header>

<div class="app-grid">
    <div class="sidebar" id="sidebar"></div>
    <div class="calendar" id="calendar">
        <div class="date-row" id="dateHeader"></div>
        <div id="gridBody"></div>
    </div>
</div>

<div class="modal" id="bookingModal">
    <div class="modal-body">
        <h3 id="mTitle" style="margin-top:0">Đặt phòng</h3>
        <div id="bookingFields">
            <input type="text" id="guestName" placeholder="Tên khách hàng">
            <input type="number" id="deposit" placeholder="Tiền cọc (VNĐ)">
            <input type="date" id="cin">
            <input type="date" id="cout">
            <select id="mType">
                <option value="red">Đã nhận phòng (Đỏ)</option>
                <option value="blue">Đã cọc đủ (Xanh dương)</option>
                <option value="purple">Cọc thiếu (Tím)</option>
            </select>
            <button class="btn-save" onclick="doSave()">Lưu thông tin</button>
        </div>
        <div id="checkoutFields" style="display:none">
            <p id="guestDetail"></p>
            <button class="btn-out" onclick="doCheckout()">CHECK-OUT (Dọn dẹp)</button>
        </div>
        <button class="btn-save" style="background:#ccc; color:#333" onclick="closeModal()">Đóng</button>
    </div>
</div>

<script>
    // Dữ liệu ban đầu
    let rooms = [
        { id: "P101", price: "350k", status: "clean" },
        { id: "P102", price: "400k", status: "clean" }
    ];
    let bookings = [];
    const today = new Date().toISOString().split('T')[0];

    function init() {
        renderSidebar();
        renderCalendar();
    }

    function renderSidebar() {
        const sb = document.getElementById('sidebar');
        sb.innerHTML = '';
        rooms.forEach(r => {
            // Xác định màu dấu chấm dựa trên booking HOẶC trạng thái dọn dẹp
            let color = "var(--green)";
            const active = bookings.find(b => b.room === r.id && today >= b.start && today <= b.end);
            
            if (r.status === "dirty") color = "var(--yellow)";
            else if (active) color = `var(--${active.type})`;

            sb.innerHTML += `
                <div class="room-item" onclick="toggleClean('${r.id}')">
                    <div class="room-name">${r.id}</div>
                    <div class="room-price">${r.price}</div>
                    <div class="status-dot" style="background:${color}"></div>
                </div>`;
        });
    }

    function renderCalendar() {
        const header = document.getElementById('dateHeader');
        const body = document.getElementById('gridBody');
        header.innerHTML = ''; body.innerHTML = '';

        let dates = [];
        for(let i = -1; i < 20; i++) {
            let d = new Date(); d.setDate(new Date().getDate() + i);
            const dStr = d.toISOString().split('T')[0];
            dates.push(dStr);
            header.innerHTML += `<div class="date-cell">${d.getDate()}/${d.getMonth()+1}</div>`;
        }

        rooms.forEach(r => {
            let row = `<div class="grid-row">`;
            dates.forEach(d => {
                const b = bookings.find(bk => bk.room === r.id && d >= bk.start && d <= bk.end);
                if (b) {
                    row += `<div class="cell" onclick="openCheckout('${b.id}')">
                        <div class="bar bg-${b.type}">${d === b.start ? b.name : ''}</div>
                    </div>`;
                } else if (r.status === "dirty" && d === today) {
                    row += `<div class="cell"><div class="bar bg-yellow">DỌN</div></div>`;
                } else {
                    row += `<div class="cell" onclick="openBooking('${r.id}','${d}')"></div>`;
                }
            });
            body.innerHTML += row + `</div>`;
        });
    }

    // Xử lý Check-out và Dọn dẹp
    let currentId = "";
    function openCheckout(bookingId) {
        currentId = bookingId;
        const b = bookings.find(x => x.id === bookingId);
        document.getElementById('mTitle').innerText = "Thông tin khách";
        document.getElementById('guestDetail').innerText = `Khách: ${b.name} \n Cọc: ${b.deposit} VNĐ`;
        document.getElementById('bookingFields').style.display = 'none';
        document.getElementById('checkoutFields').style.display = 'block';
        document.getElementById('bookingModal').style.display = 'flex';
    }

    function doCheckout() {
        const b = bookings.find(x => x.id === currentId);
        const r = rooms.find(room => room.id === b.room);
        r.status = "dirty"; // Chuyển phòng sang trạng thái chờ dọn
        bookings = bookings.filter(x => x.id !== currentId); // Xóa booking khỏi lịch
        init(); closeModal();
    }

    function toggleClean(roomId) {
        const r = rooms.find(x => x.id === roomId);
        if (r.status === "dirty") {
            if(confirm("Xác nhận đã dọn xong phòng " + roomId + "?")) {
                r.status = "clean";
                init();
            }
        }
    }

    // Form đặt phòng
    let selectedRoom = "";
    function openBooking(roomId, date) {
        selectedRoom = roomId;
        document.getElementById('mTitle').innerText = "Đặt phòng " + roomId;
        document.getElementById('cin').value = date;
        document.getElementById('cout').value = date;
        document.getElementById('bookingFields').style.display = 'block';
        document.getElementById('checkoutFields').style.display = 'none';
        document.getElementById('bookingModal').style.display = 'flex';
    }

    function doSave() {
        const name = document.getElementById('guestName').value;
        const dep = document.getElementById('deposit').value;
        const start = document.getElementById('cin').value;
        const end = document.getElementById('cout').value;
        const type = document.getElementById('mType').value;

        if(!name) return alert("Nhập tên khách!");
        bookings.push({ id: Date.now().toString(), room: selectedRoom, name, deposit: dep, start, end, type });
        init(); closeModal();
    }

    function openRoomForm() {
        const name = prompt("Tên phòng:");
        const price = prompt("Giá phòng (VD: 500k):");
        if(name && price) {
            rooms.push({ id: name, price: price, status: "clean" });
            init();
        }
    }

    function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }
    init();
</script>
</body>
</html>
